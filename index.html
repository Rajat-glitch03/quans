<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quans | Intelligence Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --deep-blue: #001b6e;
            --electric-blue: #009dff;
            --white: #ffffff;
            --light-grey: #f4f7f9;
            --border-color: #e5e7eb;
            --font-main: 'DM Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-main);
            background-color: var(--white);
            color: var(--deep-blue);
            height: 100vh;
            height: -webkit-fill-available;
            display: flex;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px;
            min-width: 280px;
            background-color: var(--deep-blue);
            color: var(--white);
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000;
            position: relative; /* PC behavior: pushes content */
        }

        /* When sidebar is closed on PC, it takes 0 space */
        .sidebar.closed {
            margin-left: -280px;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            margin-bottom: 8px;
            cursor: pointer;
            border-radius: 50px;
            font-size: 0.9rem;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .sidebar-item:hover { background: rgba(255, 255, 255, 0.1); }
        .sidebar-item.active-model { 
            background: rgba(0, 157, 255, 0.2); 
            border-color: var(--electric-blue); 
        }

        .dropdown-content {
            display: none;
            padding-left: 10px;
            flex-direction: column;
            margin-bottom: 10px;
        }
        .dropdown.open .dropdown-content { display: flex; }

        .new-chat-btn { background-color: var(--electric-blue); color: var(--white); font-weight: 700; margin-top: 10px; }

        .history-section { margin-top: 30px; overflow-y: auto; flex-grow: 1; }
        .history-label { font-size: 0.7rem; text-transform: uppercase; opacity: 0.6; margin-bottom: 15px; padding-left: 15px; letter-spacing: 1px;}

        /* --- MAIN SCREEN --- */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            min-width: 0; /* Prevents overflow in flex */
            position: relative;
            background: var(--white);
        }

        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            border-bottom: 1px solid var(--border-color);
            background: var(--white);
        }

        .logo { height: 26px; }

        .btn-auth {
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }
        .login-btn { color: var(--deep-blue); border: 1px solid var(--deep-blue); margin-right: 8px; }
        .signup-btn { background: var(--deep-blue); color: var(--white); }

        /* --- CHAT AREA --- */
        .chat-messages-stream {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .chat-input-area {
            padding: 20px 0 35px 0;
            background: var(--white);
            display: flex;
            flex-direction: column;
            align-items: center;
            border-top: 1px solid var(--border-color);
        }

        .access-indicator {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--electric-blue);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: var(--light-grey);
            padding: 8px 20px;
            border-radius: 50px;
            transition: all 0.3s;
        }

        .input-wrapper {
            width: 90%;
            max-width: 750px;
            position: relative;
        }

        .chat-input {
            width: 100%;
            padding: 16px 60px 16px 25px;
            border: 1px solid var(--border-color);
            border-radius: 50px;
            font-family: var(--font-main);
            font-size: 16px;
            outline: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .send-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 42px;
            height: 42px;
            background: var(--electric-blue);
            color: white;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- MOBILE REFINEMENTS --- */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -280px;
                height: 100vh;
                margin-left: 0;
            }
            .sidebar.open {
                transform: translateX(280px);
            }
            .sidebar.closed { margin-left: 0; } /* Reset PC logic for mobile */
            
            .auth-buttons { display: none; }
            .top-header { padding: 12px 15px; }
            .chat-input-area { padding-bottom: 20px; }
        }

        #sidebarOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 1500;
        }
        #sidebarOverlay.active { display: block; }
    </style>
</head>
<body>

    <div id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="dropdown open" id="modelDropdown">
            <div class="sidebar-item" onclick="toggleDropdown()">
                <i class="fa-solid fa-layer-group"></i>
                Models
                <i class="fa-solid fa-chevron-down" style="margin-left: auto; font-size: 0.7rem;"></i>
            </div>
            <div class="dropdown-content">
                <!-- ID added for default highlighting -->
                <div class="sidebar-item active-model" id="model-quans" onclick="selectModel('Quans', this)">
                    <i class="fa-solid fa-microchip"></i> Quans
                </div>
                <div class="sidebar-item" id="model-v24bb" onclick="selectModel('Quans v2.4bb', this)">
                    <i class="fa-solid fa-bolt"></i> Quans v2.4bb
                </div>
                <div class="sidebar-item" id="model-v24s" onclick="selectModel('Quans v2.4s', this)">
                    <i class="fa-solid fa-shield-halved"></i> Quans v2.4s
                </div>
            </div>
        </div>

        <div class="sidebar-item new-chat-btn">
            <i class="fa-solid fa-plus"></i> New Chat
        </div>

        <div class="history-section">
            <div class="history-label">History</div>
            <div class="sidebar-item"><i class="fa-regular fa-message"></i> Strategic Protocol</div>
        </div>
    </aside>

    <!-- MAIN -->
    <section class="main-content">
        <header class="top-header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <i class="fa-solid fa-bars" id="menuIcon" style="cursor:pointer; font-size: 1.2rem;" onclick="toggleSidebar()"></i>
                <img src="quans-logo-dark.png" alt="QUANS" class="logo">
            </div>
            <div class="auth-buttons">
                <a href="#" class="btn-auth login-btn">Login</a>
                <a href="#" class="btn-auth signup-btn">Sign Up</a>
            </div>
        </header>

        <div class="chat-messages-stream" id="chatStream"></div>

        <div class="chat-input-area">
            <!-- Dynamic indicator -->
            <div class="access-indicator" id="accessTitle">ACCESSING: QUANS</div>
            <div class="input-wrapper">
                <input type="text" class="chat-input" id="userInput" placeholder="Message Quans...">
                <button class="send-btn">
                    <i class="fa-solid fa-arrow-up"></i>
                </button>
            </div>
        </div>
    </section>

    <script>
        // Initialization
        window.onload = () => {
            // Ensure default model is displayed on load
            document.getElementById('accessTitle').innerText = "ACCESSING: QUANS";
        };

        function toggleDropdown() {
            document.getElementById('modelDropdown').classList.toggle('open');
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            
            if (window.innerWidth > 768) {
                // PC: Toggle via margin (content stays visible)
                sidebar.classList.toggle('closed');
            } else {
                // Mobile: Toggle via absolute positioning & overlay
                sidebar.classList.toggle('open');
                overlay.classList.toggle('active');
            }
        }

        function selectModel(modelName, element) {
            // 1. Update the indicator at the top
            document.getElementById('accessTitle').innerText = `ACCESSING: ${modelName.toUpperCase()}`;
            
            // 2. Update the input placeholder
            document.getElementById('userInput').placeholder = `Message ${modelName}...`;

            // 3. Update the sidebar highlight
            document.querySelectorAll('.sidebar-item').forEach(item => {
                item.classList.remove('active-model');
            });
            element.classList.add('active-model');

            // 4. On mobile, close sidebar after selection. On PC, keep it open.
            if(window.innerWidth <= 768) {
                toggleSidebar();
            }
        }

        // Auto-fix layout if window resized from mobile to PC
        window.addEventListener('resize', () => {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if(window.innerWidth > 768) {
                sidebar.classList.remove('open');
                overlay.classList.remove('active');
            }
        });
    </script>
</body>
</html>
