<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quans | Intelligence Terminal</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #171717;
            --sidebar-dark: #0d0d0d;
            --text-main: #ececec;
            --text-dim: #b4b4b4;
            --electric-blue: #007aff;
            --error-red: #ff4b4b;
            --border: rgba(255,255,255,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'DM Sans', sans-serif; }

        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-dark);
            display: flex;
            flex-direction: column;
            padding: 10px;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .new-chat-btn {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .new-chat-btn:hover { background: rgba(255,255,255,0.05); }

        .history-container { flex: 1; overflow-y: auto; margin-bottom: 20px; }
        .history-item {
            padding: 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            color: var(--text-dim);
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }
        .history-item:hover { background: rgba(255,255,255,0.05); color: white; }

        .sidebar-footer { border-top: 1px solid var(--border); padding-top: 10px; }
        .footer-item {
            padding: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 6px;
        }
        .footer-item:hover { background: rgba(255,255,255,0.05); }

        /* --- MAIN CONTENT --- */
        .main-container { flex: 1; display: flex; flex-direction: column; position: relative; }

        header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .model-selector {
            background: none;
            border: none;
            color: var(--text-main);
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-stream {
            flex: 1;
            overflow-y: auto;
            padding: 20px 10%;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* --- MESSAGES --- */
        .msg { max-width: 85%; line-height: 1.6; animation: fadeIn 0.4s ease; }
        .msg.user { align-self: flex-end; background: #2f2f2f; padding: 12px 20px; border-radius: 20px; }
        .msg.ai { align-self: flex-start; display: flex; gap: 15px; }
        .ai-icon { width: 30px; height: 30px; border-radius: 4px; background: var(--electric-blue); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }

        .system-msg { color: var(--error-red); font-family: monospace; font-size: 0.8rem; text-align: center; margin: 10px 0; }

        /* --- INPUT AREA --- */
        .input-wrapper {
            padding: 20px 10% 40px;
            position: relative;
        }

        .input-box {
            width: 100%;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 50px 14px 16px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }

        .input-box:disabled { cursor: not-allowed; background: rgba(255,255,255,0.02); }

        .send-btn {
            position: absolute;
            right: calc(10% + 10px);
            top: 28px;
            background: var(--electric-blue);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .send-btn:disabled { opacity: 0.3; background: #444; }

        /* --- MODAL --- */
        .auth-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000;
        }

        .modal-content { background: #212121; padding: 30px; border-radius: 12px; width: 350px; text-align: center; }
        .modal-content input { width: 100%; padding: 12px; margin: 10px 0; background: #2f2f2f; border: 1px solid var(--border); color: white; border-radius: 6px; }
        .modal-content button { width: 100%; padding: 12px; background: var(--electric-blue); border: none; color: white; border-radius: 6px; cursor: pointer; margin-top: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .sidebar { position: absolute; left: -260px; height: 100%; }
            .sidebar.active { left: 0; }
            .chat-stream, .input-wrapper { padding-left: 20px; padding-right: 20px; }
        }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="new-chat-btn" onclick="startNewChat()">
            <i class="fa-solid fa-plus"></i> New Chat
        </div>
        
        <div class="history-container" id="historyContainer">
            <!-- Saved chats appear here -->
        </div>

        <div class="sidebar-footer">
            <div class="footer-item" onclick="openAbout()"><i class="fa-solid fa-circle-info"></i> About Us</div>
            <div class="footer-item" onclick="openContact()"><i class="fa-solid fa-envelope"></i> Contact Us</div>
            <div id="authContainer">
                <div class="footer-item" onclick="showAuth('login')"><i class="fa-solid fa-right-to-bracket"></i> Login</div>
            </div>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main-container">
        <header>
            <div class="model-selector" onclick="toggleModelMenu()">
                <span id="currentModel">QUANS</span> <i class="fa-solid fa-chevron-down" style="font-size: 0.7rem;"></i>
            </div>
            <img src="YOUR_LOGO_HERE.png" alt="QUANS" style="height: 24px; opacity: 0.8;">
        </header>

        <div class="chat-stream" id="chatStream">
            <div class="system-msg" id="loginPrompt">SECURITY PROTOCOL: LOGIN REQUIRED TO START TERMINAL.</div>
        </div>

        <div class="input-wrapper">
            <input type="text" class="input-box" id="userInput" placeholder="Message Quans..." disabled>
            <button class="send-btn" id="sendBtn" onclick="handleSend()" disabled>
                <i class="fa-solid fa-arrow-up"></i>
            </button>
        </div>
    </main>

    <!-- AUTH MODAL -->
    <div class="auth-modal" id="authModal">
        <div class="modal-content">
            <h3 id="modalTitle">Login</h3>
            <input type="email" id="authEmail" placeholder="Email">
            <input type="password" id="authPass" placeholder="Password">
            <button onclick="processAuth()" id="authSubmitBtn">Continue</button>
            <p style="font-size: 0.8rem; margin-top: 15px; cursor: pointer; color: var(--text-dim);" onclick="toggleAuthMode()">Don't have an account? Sign Up</p>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>

    <script>
        // 1. FIREBASE CONFIG (Add your Vercel Env Vars here later)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_DOMAIN",
            projectId: "YOUR_PROJECT",
            storageBucket: "YOUR_BUCKET",
            messagingSenderId: "YOUR_SENDER",
            appId: "YOUR_APP"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentChatId = null;
        let authMode = 'login';

        // --- AUTH LOGIC ---
        function showAuth(mode) {
            authMode = mode;
            document.getElementById('authModal').style.display = 'flex';
        }

        function toggleAuthMode() {
            authMode = authMode === 'login' ? 'signup' : 'login';
            document.getElementById('modalTitle').innerText = authMode === 'login' ? 'Login' : 'Sign Up';
        }

        async function processAuth() {
            const email = document.getElementById('authEmail').value;
            const pass = document.getElementById('authPass').value;
            try {
                if (authMode === 'login') {
                    await auth.signInWithEmailAndPassword(email, pass);
                } else {
                    await auth.createUserWithEmailAndPassword(email, pass);
                }
                document.getElementById('authModal').style.display = 'none';
            } catch (error) {
                appendSystemMsg("AUTH ERROR: " + error.code);
            }
        }

        auth.onAuthStateChanged(user => {
            const input = document.getElementById('userInput');
            const btn = document.getElementById('sendBtn');
            const authContainer = document.getElementById('authContainer');
            const prompt = document.getElementById('loginPrompt');

            if (user) {
                input.disabled = false;
                btn.disabled = false;
                if(prompt) prompt.style.display = 'none';
                authContainer.innerHTML = `<div class="footer-item" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</div>`;
                loadHistory();
            } else {
                input.disabled = true;
                btn.disabled = true;
                authContainer.innerHTML = `<div class="footer-item" onclick="showAuth('login')"><i class="fa-solid fa-right-to-bracket"></i> Login</div>`;
            }
        });

        function logout() { auth.signOut().then(() => location.reload()); }

        // --- CHAT LOGIC ---
        function appendSystemMsg(text) {
            const div = document.createElement('div');
            div.className = 'system-msg';
            div.innerText = `> ${text}`;
            document.getElementById('chatStream').appendChild(div);
        }

        function toggleModelMenu() {
            const model = prompt("Select Model: Quans, Quans Pro, Llama 3");
            if(model && model.toLowerCase() !== 'quans') {
                appendSystemMsg(`${model.toUpperCase()} IS CURRENTLY UNAVAILABLE.`);
            } else {
                document.getElementById('currentModel').innerText = "QUANS";
            }
        }

        async function handleSend() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            if (!currentChatId) await createNewChat(text);

            appendMessage('user', text);
            input.value = "";

            // --- API CALL (Ready for Vercel) ---
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    body: JSON.stringify({ message: text, userId: auth.currentUser.uid, chatId: currentChatId })
                });
                const data = await response.json();
                appendMessage('ai', data.reply);
                saveMessage(currentChatId, text, data.reply);
            } catch (e) {
                appendSystemMsg("CONNECTION ERROR: CHECK TERMINAL UPLINK.");
            }
        }

        function appendMessage(role, text) {
            const stream = document.getElementById('chatStream');
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.innerHTML = role === 'ai' 
                ? `<div class="ai-icon">Q</div><div>${text}</div>`
                : text;
            stream.appendChild(div);
            stream.scrollTop = stream.scrollHeight;
        }

        // --- HISTORY & NEW CHAT ---
        async function createNewChat(firstMsg) {
            const res = await db.collection('users').doc(auth.currentUser.uid).collection('chats').add({
                title: firstMsg.substring(0, 30),
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            currentChatId = res.id;
            loadHistory();
        }

        function startNewChat() {
            currentChatId = null;
            document.getElementById('chatStream').innerHTML = "";
            appendSystemMsg("NEW SESSION INITIALIZED.");
        }

        async function saveMessage(chatId, userMsg, aiMsg) {
            await db.collection('users').doc(auth.currentUser.uid).collection('chats').doc(chatId).collection('messages').add({
                user: userMsg,
                ai: aiMsg,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        async function loadHistory() {
            const container = document.getElementById('historyContainer');
            const snap = await db.collection('users').doc(auth.currentUser.uid).collection('chats').orderBy('timestamp', 'desc').get();
            container.innerHTML = "";
            snap.forEach(doc => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerText = doc.data().title;
                item.onclick = () => loadChat(doc.id);
                container.appendChild(item);
            });
        }

        async function loadChat(id) {
            currentChatId = id;
            const stream = document.getElementById('chatStream');
            stream.innerHTML = "";
            const snap = await db.collection('users').doc(auth.currentUser.uid).collection('chats').doc(id).collection('messages').orderBy('timestamp').get();
            snap.forEach(doc => {
                appendMessage('user', doc.data().user);
                appendMessage('ai', doc.data().ai);
            });
        }

        function openAbout() { appendSystemMsg("QUANS INTELLIGENCE V1.0. TACTICAL AI SOLUTIONS."); }
        function openContact() { appendSystemMsg("SUPPORT ENCRYPTED. CONTACT: ADMIN@QUANS.INTEL"); }
    </script>
</body>
</html>
