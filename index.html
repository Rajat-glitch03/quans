<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quans Intelligence | Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --deep-blue: #020617;
            --electric-blue: #3b82f6;
            --soft-blue: #1e293b;
            --faint-white: #f8fafc;
            --text-dim: #94a3b8;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'DM Sans', sans-serif; }

        /* Modified height to 100dvh for mobile address bar compatibility */
        body { background-color: var(--deep-blue); color: var(--faint-white); height: 100dvh; overflow: hidden; display: flex; }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px;
            background: #0f172a;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255,255,255,0.05);
            transition: var(--transition);
            z-index: 1000;
        }

        .sidebar.closed { transform: translateX(-100%); width: 0; overflow: hidden; }

        .sidebar-header { padding: 20px; }
        
        /* Models Dropdown */
        .model-section { margin-bottom: 20px; }
        .dropdown {
            background: var(--soft-blue);
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .dropdown-menu {
            position: absolute;
            top: 105%; left: 0; width: 100%;
            background: #1e293b;
            border-radius: 8px;
            display: none;
            flex-direction: column;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .dropdown-menu.open { display: flex; }
        .dropdown-item { padding: 12px; font-size: 0.9rem; transition: 0.2s; }
        .dropdown-item:hover { background: var(--electric-blue); }

        /* History & Actions */
        .new-chat {
            padding: 12px; border: 1px dashed var(--electric-blue);
            border-radius: 8px; text-align: center; cursor: pointer; margin: 10px 20px;
            transition: 0.2s; color: var(--electric-blue); font-weight: 500;
        }
        .new-chat:hover { background: rgba(59, 130, 246, 0.1); }

        .history-list { flex: 1; overflow-y: auto; padding: 0 20px; }
        .history-item {
            padding: 10px; border-radius: 6px; font-size: 0.85rem;
            color: var(--text-dim); cursor: pointer; margin-bottom: 5px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .history-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .history-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; margin-right: 10px; }
        .delete-history { color: var(--text-dim); transition: 0.2s; cursor: pointer; padding: 5px; }
        .delete-history:hover { color: #ef4444; }

        .sidebar-footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.05); }
        .footer-link { display: flex; align-items: center; gap: 10px; padding: 10px 0; color: var(--text-dim); text-decoration: none; font-size: 0.9rem; cursor: pointer; }
        .footer-link:hover { color: var(--electric-blue); }

        /* --- MAIN CONTENT --- */
        /* Explicitly bound flexbox to ensure no overflow goes off-screen */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; height: 100%; overflow: hidden; }

        header {
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .header-left { display: flex; align-items: center; gap: 20px; }
        .menu-toggle { font-size: 1.5rem; cursor: pointer; color: var(--electric-blue); }
        .logo { height: 30px; zoom: 2;}

        .header-right { display: flex; gap: 15px; align-items: center; }
        .btn-auth {
            padding: 8px 18px; border-radius: 6px; font-size: 0.9rem;
            cursor: pointer; border: none; font-weight: 600; transition: 0.2s;
        }
        .btn-login { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.1); }
        .btn-signup { background: var(--electric-blue); color: white; }

        /* User Profile Dropdown */
        .user-greet { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .user-dropdown {
            position: absolute; top: 60px; right: 25px;
            background: #1e293b; border-radius: 8px; width: 150px;
            display: none; flex-direction: column; border: 1px solid rgba(255,255,255,0.1);
        }
        .user-dropdown.show { display: flex; }

        /* Chat Area */
        .chat-container { flex: 1; overflow-y: auto; padding: 40px 15%; display: flex; flex-direction: column; gap: 20px; }
        .message { max-width: 80%; padding: 15px 20px; border-radius: 12px; line-height: 1.6; animation: fadeIn 0.4s ease; }
        .message.user { align-self: flex-end; background: var(--electric-blue); color: white; }
        .message.ai { align-self: flex-start; background: var(--soft-blue); color: var(--faint-white); }

        /* Input Area */
        .input-area { padding: 20px 15%; background: var(--deep-blue); flex-shrink: 0; }
        .input-wrapper {
            position: relative; background: var(--soft-blue);
            border-radius: 12px; padding: 12px 15px; border: 1px solid rgba(255,255,255,0.1);
        }
        .model-indicator { font-size: 0.75rem; color: var(--electric-blue); margin-bottom: 8px; font-weight: 700; text-transform: uppercase; }
        .chat-input {
            width: 100%; background: transparent; border: none;
            color: white; outline: none; font-size: 1rem; padding-right: 40px;
        }
        .send-btn {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--electric-blue); font-size: 1.2rem; cursor: pointer;
        }

        /* --- MODALS & ERROR TOAST --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal {
            background: #0f172a; width: 400px; padding: 30px;
            border-radius: 16px; border: 1px solid rgba(255,255,255,0.1);
            position: relative; animation: slideUp 0.3s ease;
        }
        .modal h2 { margin-bottom: 20px; font-weight: 700; }
        .form-group { margin-bottom: 15px; position: relative; }
        .form-input {
            width: 100%; padding: 12px; background: #1e293b;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
            color: white; outline: none;
        }
        .toggle-pass { position: absolute; right: 12px; top: 14px; cursor: pointer; color: var(--text-dim); }
        .modal-btn { width: 100%; padding: 12px; background: var(--electric-blue); border: none; color: white; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        
        /* New Error Toast Styles */
        .error-toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: rgba(239, 68, 68, 0.95); backdrop-filter: blur(5px); color: white;
            padding: 12px 20px; border-radius: 8px; display: flex; align-items: center; gap: 12px;
            z-index: 3000; font-size: 0.9rem; font-weight: 600; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease; opacity: 0; pointer-events: none;
        }
        .error-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; pointer-events: auto; }

        /* Mobile Overlay */
        #mobile-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 999; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; height: 100%; transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); width: 280px; }
            .chat-container { padding: 20px 5%; }
            .input-area { padding: 15px 5%; }
            .modal { width: 90%; }
        }
    </style>
</head>
<body>

    <!-- CUSTOM ERROR TOAST -->
    <div class="error-toast" id="errorToast">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span id="errorMsg">An error occurred.</span>
        <i class="fa-solid fa-xmark" style="cursor:pointer; margin-left:10px" onclick="hideError()"></i>
    </div>

    <div id="mobile-overlay" onclick="toggleSidebar()"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="model-section">
                <p style="font-size: 0.7rem; color: var(--text-dim); margin-bottom: 8px;">INTELLIGENCE MODEL</p>
                <div class="dropdown" onclick="toggleModelDropdown()">
                    <span id="activeModelName">Quans</span>
                    <i class="fa-solid fa-chevron-down"></i>
                    <div class="dropdown-menu" id="modelMenu">
                        <div class="dropdown-item" onclick="selectModel('Quans')">Quans</div>
                        <div class="dropdown-item" onclick="selectModel('Quans v2.4bb')">Quans v2.4bb</div>
                        <div class="dropdown-item" onclick="selectModel('Quans v2.4s')">Quans v2.4s</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="new-chat" onclick="startNewChat()">
            <i class="fa-solid fa-plus"></i> New Chat
        </div>

        <div class="history-list" id="historyList">
            <!-- History Items Inject Here -->
        </div>

        <div class="sidebar-footer">
            <div class="footer-link"><i class="fa-solid fa-crown"></i> Premium</div>
            <div class="footer-link"><i class="fa-solid fa-circle-info"></i> About Us</div>
            <div class="footer-link"  onclick="window.location.href='contact.html'"><i class="fa-solid fa-paper-plane"></i> Contact Us</div>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main-content">
        <header>
            <div class="header-left">
                <i class="fa-solid fa-bars-staggered menu-toggle" onclick="toggleSidebar()"></i>
                <img src="quans.png" alt="Logo" class="logo">
            </div>
            <div class="header-right" id="authHeader">
                <button class="btn-auth btn-login" onclick="openModal('login')">Login</button>
                <button class="btn-auth btn-signup" onclick="openModal('signup')">Sign Up</button>
            </div>
        </header>

        <div class="chat-container" id="chatBox">
            <div class="message ai">Hello! I am Quans Intelligence. Please login to begin your encrypted session.</div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <div class="model-indicator" id="inputModelLabel">Current Model: Quans</div>
                <input type="text" class="chat-input" id="userInput" placeholder="Login to send message..." disabled>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </main>

    <!-- AUTH MODAL -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <i class="fa-solid fa-xmark" style="position:absolute; right:20px; top:20px; cursor:pointer" onclick="closeModal()"></i>
            <h2 id="modalTitle">Welcome Back</h2>
            <div class="form-group">
                <input type="email" class="form-input" id="authEmail" placeholder="Email Address">
            </div>
            <div class="form-group">
                <input type="password" class="form-input" id="authPass" placeholder="Password">
                <i class="fa-solid fa-eye toggle-pass" onclick="togglePassVisibility()"></i>
            </div>
            <p id="forgotLink" style="font-size: 0.8rem; color: var(--electric-blue); cursor: pointer; margin-bottom: 15px;" onclick="handleForgot()">Forgot Password?</p>
            <button class="modal-btn" onclick="handleAuthSubmit()" id="authBtn">Continue</button>
            <p id="switchAuth" style="text-align: center; font-size: 0.85rem; margin-top: 20px; cursor: pointer; color: var(--text-dim)"></p>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <script>
        // --- FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyAnmQzjObZEF6AQ7PJUrPuuFmuhJq_R23U",
  authDomain: "quans-14b18.firebaseapp.com",
  projectId: "quans-14b18",
  storageBucket: "quans-14b18.firebasestorage.app",
  messagingSenderId: "309027278772",
  appId: "1:309027278772:web:7273a0ca9490df3c056ce1",
  measurementId: "G-8KH5DW1SP1"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- STATE MANAGEMENT ---
        let currentMode = 'login';
        let currentUser = null;
        let errorTimeout;

        // --- ERROR HANDLING ---
        function showError(msg) {
            const toast = document.getElementById('errorToast');
            document.getElementById('errorMsg').innerText = msg;
            toast.classList.add('show');
            clearTimeout(errorTimeout);
            errorTimeout = setTimeout(hideError, 4000); // Auto-hide
        }

        function hideError() {
            document.getElementById('errorToast').classList.remove('show');
        }

        // --- UI HELPERS ---
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            if (window.innerWidth <= 768) {
                sb.classList.toggle('active');
                overlay.style.display = sb.classList.contains('active') ? 'block' : 'none';
            } else {
                sb.classList.toggle('closed');
            }
        }

        function toggleModelDropdown() {
            document.getElementById('modelMenu').classList.toggle('open');
        }

        function selectModel(name) {
            if (name !== 'Quans') {
                showError(`${name} is not available right now.`);
                return;
            }
            document.getElementById('activeModelName').innerText = name;
            document.getElementById('inputModelLabel').innerText = "Current Model: " + name;
            toggleModelDropdown();
        }

        function togglePassVisibility() {
            const passInput = document.getElementById('authPass');
            const icon = document.querySelector('.toggle-pass');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passInput.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // --- AUTH LOGIC ---
        function openModal(mode) {
            currentMode = mode;
            document.getElementById('modalOverlay').style.display = 'flex';
            document.getElementById('modalTitle').innerText = mode === 'login' ? 'Welcome Back' : 'Create Account';
            document.getElementById('authBtn').innerText = mode === 'login' ? 'Login' : 'Sign Up';
            document.getElementById('switchAuth').innerText = mode === 'login' ? "Don't have an account? Sign Up" : "Already have an account? Login";
            document.getElementById('switchAuth').onclick = () => openModal(mode === 'login' ? 'signup' : 'login');
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        async function handleAuthSubmit() {
            const email = document.getElementById('authEmail').value;
            const pass = document.getElementById('authPass').value;
            
            try {
                if (currentMode === 'login') {
                    await auth.signInWithEmailAndPassword(email, pass);
                } else {
                    await auth.createUserWithEmailAndPassword(email, pass);
                }
                closeModal();
            } catch (error) {
                showError(error.message);
            }
        }

        async function handleForgot() {
            const email = document.getElementById('authEmail').value;
            if (!email) return showError("Please enter your email address.");
            try {
                await auth.sendPasswordResetEmail(email);
                showError("Reset link sent to your email!");
            } catch (error) {
                showError(error.message);
            }
        }

        auth.onAuthStateChanged(user => {
            currentUser = user;
            const header = document.getElementById('authHeader');
            const input = document.getElementById('userInput');
            const btn = document.getElementById('sendBtn');
            
            if (user) {
                header.innerHTML = `
                    <div class="user-greet" onclick="toggleUserMenu()">
                        <span>HELLO! ${user.email.split('@')[0].toUpperCase()}</span>
                        <i class="fa-solid fa-chevron-down"></i>
                        <div class="user-dropdown" id="userMenu">
                            <div class="dropdown-item">Account</div>
                            <div class="dropdown-item" onclick="handleLogout()">Logout</div>
                        </div>
                    </div>
                `;
                input.disabled = false;
                input.placeholder = "Type your message...";
                btn.disabled = false;
                loadHistory();
            } else {
                header.innerHTML = `
                    <button class="btn-auth btn-login" onclick="openModal('login')">Login</button>
                    <button class="btn-auth btn-signup" onclick="openModal('signup')">Sign Up</button>
                `;
                input.disabled = true;
                btn.disabled = true;
                document.getElementById('historyList').innerHTML = '';
            }
        });

        function toggleUserMenu() {
            document.getElementById('userMenu').classList.toggle('show');
        }

        function handleLogout() {
            auth.signOut();
            location.reload();
        }

        // --- MESSAGING & HISTORY ---
        async function sendMessage() {
    const input = document.getElementById('userInput');
    const msg = input.value.trim();
    if (!msg || !currentUser) return;

    // UI: Display user message and clear terminal field
    appendMessage('user', msg);
    input.value = '';

    // UI: Create "Thinking..." indicator
    const box = document.getElementById('chatBox');
    const loadingDiv = document.createElement('div');
    loadingDiv.className = 'message ai';
    loadingDiv.id = 'quans-thinking';
    loadingDiv.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Synthesizing matrix...`;
    box.appendChild(loadingDiv);
    box.scrollTop = box.scrollHeight;

    try {
        // CALL VERCEL SERVERLESS ENDPOINT
        const response = await fetch('/api/askQuans', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ prompt: msg })
        });

        const data = await response.json();
        
        if (!response.ok) throw new Error(data.error || "Unknown network error");

        // Remove indicator
        document.getElementById('quans-thinking').remove();

        // UI: Setup AI Response layout wrapper
        const aiDiv = document.createElement('div');
        aiDiv.className = 'message ai';
        box.appendChild(aiDiv);

        // Optional: Save history to Firebase right here on the client side
        // since the response successfully came back securely!
        await firebase.firestore()
            .collection('users').doc(currentUser.uid)
            .collection('history').add({
                text: msg,
                response: data.answer,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

        // Typewriter effect execution
        let index = 0;
        const textPayload = data.answer;
        function typeWriter() {
            if (index < textPayload.length) {
                aiDiv.innerHTML += textPayload.charAt(index);
                index++;
                box.scrollTop = box.scrollHeight;
                setTimeout(typeWriter, 15);
            } else {
                loadHistory(); // Refresh sidebar layout
            }
        }
        typeWriter();

    } catch (err) {
        if (document.getElementById('quans-thinking')) {
            document.getElementById('quans-thinking').remove();
        }
        showError("Terminal Link Exception: " + err.message);
    }
}

        function appendMessage(role, text) {
            const box = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerText = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        async function loadHistory() {
            if (!currentUser) return;
            try {
                const snapshot = await db.collection('users').doc(currentUser.uid).collection('history')
                    .orderBy('timestamp', 'desc').limit(10).get();
                
                const list = document.getElementById('historyList');
                list.innerHTML = '';
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const item = document.createElement('div');
                    item.className = 'history-item';
                    
                    item.innerHTML = `
                        <div class="history-text">
                            <i class="fa-regular fa-message"></i> ${data.text}
                        </div>
                        <i class="fa-solid fa-trash-can delete-history" title="Delete chat"></i>
                    `;
                    
                    // Click the text to view history
                    item.querySelector('.history-text').onclick = () => {
                        document.getElementById('chatBox').innerHTML = '';
                        appendMessage('user', data.text);
                        appendMessage('ai', data.response);
                    };

                    // Delete button logic
                    item.querySelector('.delete-history').onclick = async (e) => {
                        e.stopPropagation(); // Prevents triggering the text click
                        if (confirm("Are you sure you want to delete this chat history?")) {
                            try {
                                await db.collection('users').doc(currentUser.uid).collection('history').doc(doc.id).delete();
                                loadHistory(); // Reload UI after deletion
                            } catch (err) {
                                showError("Failed to delete chat: " + err.message);
                            }
                        }
                    };

                    list.appendChild(item);
                });
            } catch (err) {
                showError("Failed to load history: " + err.message);
            }
        }

        function startNewChat() {
            document.getElementById('chatBox').innerHTML = '<div class="message ai">New encrypted session started. How can I assist you?</div>';
        }
    </script>
</body>
</html>
