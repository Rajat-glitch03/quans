<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quans Intelligence | Terminal</title>
    <!-- Icons and Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --bg-dark: #212121; /* GPT Dark Grey */
            --sidebar-bg: #171717;
            --text-main: #ececec;
            --electric-blue: #3d5afe;
            --border: rgba(255,255,255,0.1);
            --error: #ff4b4b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            padding: 10px;
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .new-chat-btn {
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            transition: background 0.2s;
        }
        .new-chat-btn:hover { background: rgba(255,255,255,0.05); }

        .history-list { flex-grow: 1; overflow-y: auto; margin-bottom: 10px; }
        .history-item {
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .history-item:hover { background: #2a2a2a; }

        .sidebar-footer { border-top: 1px solid var(--border); padding-top: 10px; }
        .footer-item { padding: 10px; cursor: pointer; font-size: 0.85rem; color: #aaa; transition: 0.2s; }
        .footer-item:hover { color: white; }

        /* --- MAIN CONTENT --- */
        .main-container { flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        
        .header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .model-selector {
            background: none;
            border: none;
            color: white;
            font-weight: 600;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
        }

        /* --- CHAT AREA --- */
        .chat-stream {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .message { display: flex; gap: 15px; animation: fadeIn 0.3s ease; }
        .message.user { justify-content: flex-end; }
        .bubble {
            max-width: 85%;
            padding: 10px 15px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 0.95rem;
        }
        .user .bubble { background: #343541; border: 1px solid var(--border); }
        .ai .bubble { background: none; }

        /* --- INPUT AREA --- */
        .input-area { padding: 20px; max-width: 800px; margin: 0 auto; width: 100%; }
        .input-wrapper {
            background: #40414f;
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 10px 15px;
            border: 1px solid var(--border);
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        .chat-input {
            background: none;
            border: none;
            color: white;
            flex-grow: 1;
            outline: none;
            font-size: 1rem;
            resize: none;
        }
        .chat-input:disabled { cursor: not-allowed; opacity: 0.5; }
        .send-btn { background: var(--electric-blue); border: none; color: white; padding: 8px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .send-btn:disabled { background: #555; }

        /* --- AUTH MODAL --- */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-content { background: #2a2a2a; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; }
        .form-group { margin-bottom: 15px; }
        .form-group input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid var(--border); background: #171717; color: white; outline: none; }
        .auth-btn { width: 100%; padding: 12px; background: var(--electric-blue); border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .error-msg { color: var(--error); font-size: 0.8rem; margin-top: 5px; display: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* MOBILE RESPONSIVE */
        @media (max-width: 768px) {
            .sidebar { position: absolute; transform: translateX(-100%); height: 100%; }
            .sidebar.open { transform: translateX(0); }
            .mobile-toggle { display: block !important; }
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="new-chat-btn" onclick="startNewChat()">
            <i class="fa-solid fa-plus"></i> New Chat
        </div>
        <div class="history-list" id="historyList">
            <!-- History populated by JS -->
        </div>
        <div class="sidebar-footer">
            <div class="footer-item" onclick="alert('Contact: support@quans.int')"><i class="fa-solid fa-envelope"></i> Contact Us</div>
            <div class="footer-item" onclick="alert('Quans v1.0 - Next Gen Intelligence')"><i class="fa-solid fa-info-circle"></i> About Us</div>
            <div id="logoutSection" style="display:none">
                <div class="footer-item" onclick="handleLogout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</div>
            </div>
        </div>
    </aside>

    <!-- Main -->
    <main class="main-container">
        <header class="header">
            <div style="display:flex; align-items:center; gap:10px;">
                <i class="fa-solid fa-bars mobile-toggle" style="display:none; cursor:pointer;" onclick="toggleSidebar()"></i>
                <button class="model-selector" id="modelBtn" onclick="toggleModelSelect()">QUANS <i class="fa-solid fa-chevron-down" style="font-size:0.7rem"></i></button>
            </div>
            <div id="userHeader">
                <button class="auth-btn" style="padding: 5px 15px;" onclick="openAuth()">Login</button>
            </div>
        </header>

        <div class="chat-stream" id="chatStream">
            <div class="ai message" id="initialGreeting">
                <div class="bubble">Systems initialized. How can Quans assist your operations today?</div>
            </div>
        </div>

        <footer class="input-area">
            <div class="input-wrapper">
                <input type="text" class="chat-input" id="userInput" placeholder="Login to start texting..." disabled>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
                    <i class="fa-solid fa-arrow-up"></i>
                </button>
            </div>
        </footer>
    </main>

    <!-- Auth Modal -->
    <div class="modal" id="authModal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-bottom:20px">Login</h2>
            <div class="form-group">
                <input type="email" id="authEmail" placeholder="Email Address">
            </div>
            <div class="form-group">
                <input type="password" id="authPass" placeholder="Password">
                <p class="error-msg" id="authError"></p>
            </div>
            <button class="auth-btn" id="mainAuthBtn" onclick="processAuth()">Continue</button>
            <p style="text-align:center; margin-top:15px; font-size:0.8rem; cursor:pointer" id="toggleAuth" onclick="switchAuthMode()">Need an account? Sign Up</p>
            <p style="text-align:center; margin-top:10px; font-size:0.8rem; cursor:pointer; color:#aaa" onclick="closeAuth()">Cancel</p>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentChatId = null;
        let isSignUp = false;

        // --- AUTH LOGIC ---
        function openAuth() { document.getElementById('authModal').style.display = 'flex'; }
        function closeAuth() { document.getElementById('authModal').style.display = 'none'; }
        
        function switchAuthMode() {
            isSignUp = !isSignUp;
            document.getElementById('modalTitle').innerText = isSignUp ? "Create Account" : "Login";
            document.getElementById('toggleAuth').innerText = isSignUp ? "Already have an account? Login" : "Need an account? Sign Up";
        }

        async function processAuth() {
            const email = document.getElementById('authEmail').value;
            const pass = document.getElementById('authPass').value;
            const errorLabel = document.getElementById('authError');
            errorLabel.style.display = 'none';

            try {
                if (isSignUp) await auth.createUserWithEmailAndPassword(email, pass);
                else await auth.signInWithEmailAndPassword(email, pass);
                closeAuth();
            } catch (err) {
                errorLabel.style.display = 'block';
                // CUSTOM FIREBASE ERROR RESPONSES
                switch(err.code) {
                    case 'auth/user-not-found': errorLabel.innerText = "No Quans profile found with this email."; break;
                    case 'auth/wrong-password': errorLabel.innerText = "Access denied: Incorrect credentials."; break;
                    case 'auth/email-already-in-use': errorLabel.innerText = "Protocol error: Email already registered."; break;
                    case 'auth/weak-password': errorLabel.innerText = "Security risk: Password too short."; break;
                    default: errorLabel.innerText = err.message;
                }
            }
        }

        function handleLogout() { auth.signOut().then(() => location.reload()); }

        // --- CHAT LOGIC ---
        auth.onAuthStateChanged(user => {
            const input = document.getElementById('userInput');
            const btn = document.getElementById('sendBtn');
            const userHeader = document.getElementById('userHeader');
            const logoutSection = document.getElementById('logoutSection');

            if (user) {
                input.disabled = false;
                btn.disabled = false;
                input.placeholder = "Message Quans...";
                userHeader.innerHTML = `<span style="font-size:0.8rem; color:#aaa">${user.email}</span>`;
                logoutSection.style.display = 'block';
                loadHistory();
            } else {
                input.disabled = true;
                btn.disabled = true;
            }
        });

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            if (!currentChatId) {
                const newDoc = await db.collection('users').doc(auth.currentUser.uid).collection('chats').add({
                    title: text.substring(0, 30),
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                currentChatId = newDoc.id;
            }

            appendMessage('user', text);
            input.value = "";

            // Save User Message
            await db.collection('users').doc(auth.currentUser.uid)
                    .collection('chats').doc(currentChatId)
                    .collection('messages').add({
                        text: text,
                        sender: 'user',
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });

            // Trigger AI Response (Calling your Vercel API)
            getAIResponse(text);
        }

        async function getAIResponse(userText) {
            // This calls the environment variable-protected backend
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: userText })
                });
                const data = await response.json();
                appendMessage('ai', data.reply);
                
                // Save AI Message
                await db.collection('users').doc(auth.currentUser.uid)
                    .collection('chats').doc(currentChatId)
                    .collection('messages').add({
                        text: data.reply,
                        sender: 'ai',
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
            } catch (e) {
                appendMessage('ai', "Error connecting to Quans Core. Please try again.");
            }
        }

        function appendMessage(sender, text) {
            document.getElementById('initialGreeting').style.display = 'none';
            const stream = document.getElementById('chatStream');
            const div = document.createElement('div');
            div.className = `${sender} message`;
            div.innerHTML = `<div class="bubble">${text}</div>`;
            stream.appendChild(div);
            stream.scrollTop = stream.scrollHeight;
        }

        // --- HISTORY & CHAT MGMT ---
        function startNewChat() {
            currentChatId = null;
            document.getElementById('chatStream').innerHTML = '';
            document.getElementById('initialGreeting').style.display = 'flex';
        }

        async function loadHistory() {
            const historyList = document.getElementById('historyList');
            db.collection('users').doc(auth.currentUser.uid).collection('chats')
              .orderBy('timestamp', 'desc').onSnapshot(snap => {
                  historyList.innerHTML = '';
                  snap.forEach(doc => {
                      const item = document.createElement('div');
                      item.className = 'history-item';
                      item.innerHTML = `<i class="fa-regular fa-message"></i> ${doc.data().title}`;
                      item.onclick = () => openChat(doc.id);
                      historyList.appendChild(item);
                  });
              });
        }

        async function openChat(id) {
            currentChatId = id;
            const stream = document.getElementById('chatStream');
            stream.innerHTML = '';
            const msgs = await db.collection('users').doc(auth.currentUser.uid)
                                .collection('chats').doc(id)
                                .collection('messages').orderBy('timestamp', 'asc').get();
            msgs.forEach(m => appendMessage(m.data().sender, m.data().text));
        }

        function toggleModelSelect() {
            alert("Other models are unavailable for now. QUANS Core is the active protocol.");
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }
    </script>
</body>
</html>
