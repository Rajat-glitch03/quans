<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quans | Intelligence Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --deep-blue: #001b6e;
            --electric-blue: #009dff;
            --white: #ffffff;
            --light-grey: #f4f7f9;
            --border-color: #e5e7eb;
            --font-main: 'DM Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-main);
            background-color: var(--white);
            color: var(--deep-blue);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px;
            background-color: var(--deep-blue);
            color: var(--white);
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            margin-bottom: 8px;
            cursor: pointer;
            border-radius: 50px;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .sidebar-item:hover { background: rgba(255, 255, 255, 0.1); }
        .sidebar-item.active-model { background: rgba(0, 157, 255, 0.2); border: 1px solid var(--electric-blue); }

        .dropdown-content {
            display: none;
            padding-left: 10px;
            flex-direction: column;
            margin-bottom: 10px;
        }
        .dropdown.open .dropdown-content { display: flex; }

        .new-chat-btn { background-color: var(--electric-blue); color: var(--white); font-weight: 700; margin-top: 10px; }

        .history-section { margin-top: 30px; overflow-y: auto; flex-grow: 1; }
        .history-label { font-size: 0.7rem; text-transform: uppercase; opacity: 0.6; margin-bottom: 15px; padding-left: 15px; }

        /* --- MAIN SCREEN --- */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; }

        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            border-bottom: 1px solid var(--border-color);
        }

        .logo { height: 30px; }

        .btn-auth {
            padding: 8px 22px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .login-btn { color: var(--deep-blue); border: 1px solid var(--deep-blue); margin-right: 10px;}
        .signup-btn { background: var(--deep-blue); color: var(--white); }

        /* --- CHAT SECTION --- */
        .chat-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 40px;
            background: var(--white);
        }

        .access-indicator {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--electric-blue);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: var(--light-grey);
            padding: 8px 20px;
            border-radius: 50px;
        }

        .input-wrapper {
            width: 90%;
            max-width: 750px;
            position: relative;
        }

        .chat-input {
            width: 100%;
            padding: 16px 60px 16px 25px;
            border: 1px solid var(--border-color);
            border-radius: 50px;
            font-family: var(--font-main);
            font-size: 1rem;
            outline: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .send-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            background: var(--electric-blue);
            color: white;
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .sidebar { position: absolute; left: -280px; height: 100%; }
            .sidebar.open { transform: translateX(280px); }
        }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="dropdown open" id="modelDropdown">
            <div class="sidebar-item" onclick="toggleDropdown()">
                <i class="fa-solid fa-layer-group"></i>
                Models
                <i class="fa-solid fa-chevron-down" style="margin-left: auto; font-size: 0.7rem;"></i>
            </div>
            <div class="dropdown-content">
                <div class="sidebar-item active-model" onclick="selectModel('Quans', this)">
                    <i class="fa-solid fa-microchip"></i> Quans
                </div>
                <div class="sidebar-item" onclick="selectModel('Quans v2.4bb', this)">
                    <i class="fa-solid fa-bolt"></i> Quans v2.4bb
                </div>
                <div class="sidebar-item" onclick="selectModel('Quans v2.4s', this)">
                    <i class="fa-solid fa-shield-halved"></i> Quans v2.4s
                </div>
            </div>
        </div>

        <div class="sidebar-item new-chat-btn">
            <i class="fa-solid fa-plus"></i> New Chat
        </div>

        <div class="history-section">
            <div class="history-label">History</div>
            <div class="sidebar-item"><i class="fa-regular fa-message"></i> Strategic Overview</div>
        </div>
    </aside>

    <section class="main-content">
        <header class="top-header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <i class="fa-solid fa-bars" style="cursor:pointer" onclick="toggleSidebar()"></i>
                <img src="quans-logo-dark.png" alt="QUANS" class="logo">
            </div>
            <div>
                <a href="#" class="btn-auth login-btn">Login</a>
                <a href="#" class="btn-auth signup-btn">Sign Up</a>
            </div>
        </header>

        <div class="chat-container">
            <!-- Dynamic Model Display -->
            <div class="access-indicator" id="accessTitle">ACCESSING: QUANS</div>
            
            <div class="input-wrapper">
                <input type="text" class="chat-input" id="userInput" placeholder="Message Quans...">
                <button class="send-btn">
                    <i class="fa-solid fa-arrow-up"></i>
                </button>
            </div>
        </div>
    </section>

    <script>
        function toggleDropdown() {
            document.getElementById('modelDropdown').classList.toggle('open');
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function selectModel(modelName, element) {
            // 1. Update the top indicator
            document.getElementById('accessTitle').innerText = `ACCESSING: ${modelName.toUpperCase()}`;
            
            // 2. Update the input placeholder
            document.getElementById('userInput').placeholder = `Message ${modelName}...`;

            // 3. Update sidebar highlighting
            document.querySelectorAll('.sidebar-item').forEach(item => {
                item.classList.remove('active-model');
            });
            element.classList.add('active-model');

            // Close sidebar on mobile after selection
            if(window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
            }
        }
    </script>
</body>
</html>
