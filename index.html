<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANS | Free Business Tools</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: DM Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #FFFFFF;
        }
        /* Subtle fade-in animation for page load */
        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }
        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
    </style>
</head>
<body class="min-h-screen text-slate-900 flex flex-col selection:bg-brand-blue selection:text-white">

    <!-- NAVIGATION HEADER -->
    <header class="w-full w-full max-w-7xl mx-auto px-6 py-6 flex justify-between items-center bg-white/80 backdrop-blur-md sticky top-0 z-50">
        <!-- Logo -->
        <div class="flex items-center cursor-pointer">
            <span class="text-3xl font-black tracking-tighter text-brand-blue">QUANS<span class="text-slate-900">.</span></span>
        </div>

        <div class="hidden md:flex absolute inset-x-0 justify-center items-center pointer-events-none">
            <a href="mailto:support@yourdomain.com" class="pointer-events-auto text-base font-semibold text-slate-600 hover:text-brand-blue hover:scale-105 transition-all duration-200 tracking-tight">
                Contact Us
            </a>
        </div>
        
        <!-- Auth Buttons -->
        <div class="flex items-center space-x-3 sm:space-x-6">
            <button class="text-sm sm:text-base font-medium text-slate-600 hover:text-brand-blue transition-colors">
                Login
            </button>
            <button class="text-sm sm:text-base font-medium bg-brand-blue text-white px-5 sm:px-7 py-2.5 rounded-full hover:bg-brand-hover shadow-md hover:shadow-lg transition-all duration-300 transform hover:-translate-y-0.5">
                Signup
            </button>
        </div>
    </header>

    <!-- HERO SECTION -->
    <main class="flex-grow flex flex-col items-center px-4 sm:px-6 pt-16 sm:pt-24 pb-20 max-w-5xl mx-auto text-center">
        
        <h1 class="fade-in text-5xl sm:text-7xl font-bold tracking-tight text-slate-900 mb-6">
            Explore number of <span class="text-brand-blue">tools.</span>
        </h1>
        
        <p class="fade-in delay-1 text-lg sm:text-xl text-slate-500 max-w-2xl mx-auto mb-16 leading-relaxed">
            Use these tools for free. Not the tool you want? 
            <a href="#" class="text-brand-blue font-semibold hover:underline decoration-2 underline-offset-4">Contact Us</a> 
            with the idea of a tool. We will generate it.
        </p>

        <!-- TOOLS GRID -->
        <div class="fade-in delay-2 w-full grid grid-cols-1 sm:grid-cols-2 gap-6">
            
            <!-- Tool 1: AI Assistant -->
        <button onclick="openAuthPopup(event)" class="group relative flex flex-col items-start p-8 bg-white border-2 border-slate-100 rounded-3xl hover:border-brand-blue hover:shadow-xl hover:shadow-blue-100 transition-all duration-300 transform hover:-translate-y-1 text-left cursor-pointer overflow-hidden tool-btn">
            <div class="absolute top-0 right-0 w-32 h-32 bg-brand-light rounded-bl-full -mr-16 -mt-16 transition-transform group-hover:scale-110"></div>
            <!-- FIXED FREE ICON BELOW -->
            <div class="w-14 h-14 bg-brand-light text-brand-blue rounded-2xl flex items-center justify-center text-xl mb-6 shadow-sm">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
            </div>
            <h3 class="text-2xl font-bold text-slate-900 mb-2">AI Assistant</h3>
            <p class="text-slate-500 font-medium">Your intelligent everyday companion.</p>
            <div class="mt-6 flex items-center text-brand-blue font-bold text-sm tracking-wide opacity-0 group-hover:opacity-100 transition-opacity transform translate-x-[-10px] group-hover:translate-x-0 duration-300">
                OPEN TOOL <i class="fa-solid fa-arrow-right ml-2"></i>
            </div>
        </button>

            <!-- Tool 2: Linkedin Post Generator -->
            <button class="group relative flex flex-col items-start p-8 bg-white border-2 border-slate-100 rounded-3xl hover:border-brand-blue hover:shadow-xl hover:shadow-blue-100 transition-all duration-300 transform hover:-translate-y-1 text-left cursor-pointer overflow-hidden tool-btn">
                <div class="absolute top-0 right-0 w-32 h-32 bg-brand-light rounded-bl-full -mr-16 -mt-16 transition-transform group-hover:scale-110"></div>
                <div class="w-14 h-14 bg-brand-light text-brand-blue rounded-2xl flex items-center justify-center text-2xl mb-6 shadow-sm">
                    <i class="fa-brands fa-linkedin-in"></i>
                </div>
                <h3 class="text-2xl font-bold text-slate-900 mb-2">Linkedin Post Generator</h3>
                <p class="text-slate-500 font-medium">Craft viral content in seconds.</p>
                <div class="mt-6 flex items-center text-brand-blue font-bold text-sm tracking-wide opacity-0 group-hover:opacity-100 transition-opacity transform translate-x-[-10px] group-hover:translate-x-0 duration-300">
                    OPEN TOOL <i class="fa-solid fa-arrow-right ml-2"></i>
                </div>
            </button>

            <!-- Tool 3: Startup Idea Validator -->
            <button class="group relative flex flex-col items-start p-8 bg-white border-2 border-slate-100 rounded-3xl hover:border-brand-blue hover:shadow-xl hover:shadow-blue-100 transition-all duration-300 transform hover:-translate-y-1 text-left cursor-pointer overflow-hidden tool-btn">
                <div class="absolute top-0 right-0 w-32 h-32 bg-brand-light rounded-bl-full -mr-16 -mt-16 transition-transform group-hover:scale-110"></div>
                <div class="w-14 h-14 bg-brand-light text-brand-blue rounded-2xl flex items-center justify-center text-2xl mb-6 shadow-sm">
                    <i class="fa-solid fa-rocket"></i>
                </div>
                <h3 class="text-2xl font-bold text-slate-900 mb-2">Startup Idea Validator</h3>
                <p class="text-slate-500 font-medium">Test market demand before building.</p>
                <div class="mt-6 flex items-center text-brand-blue font-bold text-sm tracking-wide opacity-0 group-hover:opacity-100 transition-opacity transform translate-x-[-10px] group-hover:translate-x-0 duration-300">
                    OPEN TOOL <i class="fa-solid fa-arrow-right ml-2"></i>
                </div>
            </button>

            <!-- Tool 4: Outreach Personalizer -->
            <button class="group relative flex flex-col items-start p-8 bg-white border-2 border-slate-100 rounded-3xl hover:border-brand-blue hover:shadow-xl hover:shadow-blue-100 transition-all duration-300 transform hover:-translate-y-1 text-left cursor-pointer overflow-hidden tool-btn">
                <div class="absolute top-0 right-0 w-32 h-32 bg-brand-light rounded-bl-full -mr-16 -mt-16 transition-transform group-hover:scale-110"></div>
                <div class="w-14 h-14 bg-brand-light text-brand-blue rounded-2xl flex items-center justify-center text-2xl mb-6 shadow-sm">
                    <i class="fa-solid fa-envelope-open-text"></i>
                </div>
                <h3 class="text-2xl font-bold text-slate-900 mb-2">Outreach Personalizer</h3>
                <p class="text-slate-500 font-medium">Scale your cold emails effectively.</p>
                <div class="mt-6 flex items-center text-brand-blue font-bold text-sm tracking-wide opacity-0 group-hover:opacity-100 transition-opacity transform translate-x-[-10px] group-hover:translate-x-0 duration-300">
                    OPEN TOOL <i class="fa-solid fa-arrow-right ml-2"></i>
                </div>
            </button>

        </div>
    </main>

    <!-- FOOTER -->
    <footer class="fade-in delay-3 w-full py-8 text-center text-slate-400 text-sm mt-auto">
        <p>&copy; 2026 QUANS. All rights reserved.</p>
    </footer>

    <!-- AUTH WALL MODAL CONTAINER -->
    <div id="authModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 opacity-0 pointer-events-none transition-all duration-300">
        <!-- Blurred Backdrop Overlay -->
        <div id="authModalOverlay" class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm"></div>
        
        <!-- Modal Content Card -->
        <div class="relative bg-white w-full max-w-md rounded-[32px] border border-slate-100 p-8 shadow-2xl transform scale-95 transition-transform duration-300 z-10 text-center">
            <!-- Close Button -->
            <button id="closeAuthModal" class="absolute top-5 right-5 text-slate-400 hover:text-slate-600 transition-colors w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-50">
                <i class="fa-solid fa-xmark text-lg"></i>
            </button>

            <!-- Creative Icon Element -->
            <div class="w-16 h-16 bg-blue-50 text-brand-blue rounded-full flex items-center justify-center text-2xl mx-auto mb-5 shadow-sm">
                <i class="fa-solid fa-lock animate-pulse"></i>
            </div>

            <!-- Header Labels -->
            <h3 class="text-2xl font-black tracking-tight text-slate-900">Authentication Required</h3>
            <p class="text-slate-500 mt-2 text-sm leading-relaxed">Please log in or sign up to continue.</p>

            <!-- Action Interactive Buttons -->
            <div class="mt-6 space-y-3">
                <button class="w-full bg-brand-blue text-white font-medium py-3.5 px-6 rounded-full shadow-md shadow-blue-100 hover:bg-brand-hover hover:shadow-lg transition-all duration-300 transform hover:-translate-y-0.5">
                    Log In
                </button>
                <button class="w-full bg-slate-50 border border-slate-200 text-slate-700 font-medium py-3.5 px-6 rounded-full hover:bg-slate-100 transition-all duration-300">
                    Create Free Account
                </button>
            </div>
        </div>
    </div>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"DM Sans"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            blue: '#4A90E2',
                            hover: '#357ABD',
                            light: '#F0F6FF'
                        }
                    }
                }
            }
        }

        // --- AUTHENTICATION WALL POPUP ENGINE ---
        const authModal = document.getElementById('authModal');
        const authModalOverlay = document.getElementById('authModalOverlay');
        const closeAuthModal = document.getElementById('closeAuthModal');
        
       // Update this specific function inside your script
        window.openAuthPopup = function(event) {
            // This is the magic line that stops the browser from redirecting!
            if (event) {
                event.preventDefault();
                event.stopPropagation();
            }
            
            // Show the modal safely
            const authModal = document.getElementById('authModal');
            authModal.classList.remove('opacity-0', 'pointer-events-none');
            
            const modalContent = authModal.querySelector('.relative');
            modalContent.classList.remove('scale-95');
            modalContent.classList.add('scale-100');
        }

        // 2. Close Modal Mechanism
        function closeAuthPopup() {
            authModal.classList.add('opacity-0', 'pointer-events-none');
            const modalContent = authModal.querySelector('.relative');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
        }

        // 3. Attach Event Listeners to the 4 Tool Targets
        // Make sure your 4 tool buttons have the class "tool-btn"
        document.querySelectorAll('.tool-btn').forEach(button => {
            button.addEventListener('click', openAuthPopup);
        });

        // Close triggers
        closeAuthModal.addEventListener('click', closeAuthPopup);
        authModalOverlay.addEventListener('click', closeAuthPopup);
        
    </script>

</body>
</html>
