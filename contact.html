<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Quans Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --deep-blue: #020617;
            --electric-blue: #3b82f6;
            --soft-blue: #1e293b;
            --faint-white: #f8fafc;
            --text-dim: #94a3b8;
            --error-red: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'DM Sans', sans-serif; }

        body { 
            background-color: var(--deep-blue); 
            color: var(--faint-white); 
            min-height: 100dvh; 
            display: flex; 
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* CUSTOM ERROR TOAST (Same as Terminal) */
        .error-toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: rgba(239, 68, 68, 0.95); backdrop-filter: blur(5px); color: white;
            padding: 12px 20px; border-radius: 8px; display: flex; align-items: center; gap: 12px;
            z-index: 3000; font-size: 0.9rem; font-weight: 600; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease; opacity: 0;
        }
        .error-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        .container {
            width: 100%;
            max-width: 500px;
            margin-top: 40px;
            animation: fadeIn 0.6s ease;
        }

        header { text-align: center; margin-bottom: 40px; }
        .logo-text { color: var(--electric-blue); font-weight: 700; font-size: 1.5rem; letter-spacing: 1px; }

        /* FORM STYLES */
        .contact-card {
            background: var(--soft-blue);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; font-weight: 700; }
        
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--electric-blue); }
        
        .form-input {
            width: 100%;
            padding: 12px 12px 12px 45px;
            background: rgba(2, 6, 23, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: white;
            outline: none;
            transition: 0.3s;
            font-size: 1rem;
        }
        .form-input:focus { border-color: var(--electric-blue); background: rgba(2, 6, 23, 0.8); }
        
        textarea.form-input { min-height: 120px; resize: none; padding-top: 15px; }
        .input-wrapper textarea + i { top: 25px; }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--electric-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .submit-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }

        /* INFO SECTION */
        .info-section {
            margin-top: 40px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: var(--text-dim);
            font-size: 0.95rem;
        }
        .info-item i { color: var(--electric-blue); font-size: 1.2rem; }
        .info-item span { color: var(--faint-white); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } }

        @media (max-width: 480px) {
            .contact-card { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="error-toast" id="errorToast">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span id="errorMsg">Fields are compulsory!</span>
    </div>

    <div class="container">
        <header>
            <div class="logo-text">QUANS INTELLIGENCE</div>
            <p style="color: var(--text-dim); margin-top: 10px;">Direct Neural Link for Inquiries</p>
        </header>

        <div class="info-section">
            <div class="info-item">
                <i class="fa-solid fa-location-dot"></i>
                <span>Jalna, Maharashtra, India</span>
            </div>
            <div class="info-item">
                <i class="fa-solid fa-at"></i>
                <span>For any queries contact : wangikarrajat@gmail.com</span>
            </div>
        </div>
    </div>

    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <script>
        // Initialize EmailJS
        (function() {
            emailjs.init("YOUR_EMAILJS_PUBLIC_KEY"); // You'll need a free account at emailjs.com
        })();

        const form = document.getElementById('contactForm');
        const toast = document.getElementById('errorToast');
        const errorMsg = document.getElementById('errorMsg');

        function showError(msg) {
            errorMsg.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const desc = document.getElementById('description').value.trim();

            // Validation
            if (!name || !email || !desc) {
                showError("All fields are compulsory!");
                return;
            }

            // Simple Email Regex
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email)) {
                showError("Please enter a valid email address!");
                return;
            }

            // Success UI Feedback
            const btn = document.querySelector('.submit-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> TRANSMITTING...';
            btn.disabled = true;

            // Send via EmailJS
            // Replace 'YOUR_SERVICE_ID' and 'YOUR_TEMPLATE_ID' with values from EmailJS dashboard
            const templateParams = {
                from_name: name,
                from_email: email,
                message: desc,
                to_email: "wangikarrajat@gmail.com"
            };

            emailjs.send('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', templateParams)
                .then(function() {
                    alert("Message Sent! We will contact you soon.");
                    form.reset();
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }, function(error) {
                    showError("Transmission failed. Try again.");
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                });
        });
    </script>
</body>
</html>
