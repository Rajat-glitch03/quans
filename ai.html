<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>QUANS | AI Assistant</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"DM Sans"', 'sans-serif'] },
                    colors: {
                        brand: { blue: '#4A90E2', hover: '#357ABD', light: '#F0F6FF' }
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'DM Sans', sans-serif; }
        
        /* Premium Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #CBD5E1; }

        /* Animations */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Mobile Overlay */
        .sidebar-overlay { background: rgba(0,0,0,0.4); backdrop-filter: blur(2px); }
    </style>
</head>
<body class="bg-white text-slate-900 h-screen h-[100dvh] w-full flex overflow-hidden selection:bg-brand-blue selection:text-white fixed inset-0">

    <input type="file" id="systemMemoryInput" multiple class="hidden">

    <div id="mobileOverlay" class="fixed inset-0 z-40 hidden sidebar-overlay transition-opacity duration-300 sm:hidden"></div>

    <aside id="sidebar" class="bg-slate-50 border-r border-slate-100 w-72 h-full flex flex-col fixed sm:relative z-50 transform transition-transform duration-300 ease-in-out translate-x-0">
        
        <div class="p-4 flex items-center justify-between sm:hidden border-b border-slate-100">
            <span class="text-xl font-black text-brand-blue">QUANS.</span>
            <button id="closeSidebarMobile" class="text-slate-400 hover:text-slate-800 text-xl">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <div class="p-4 space-y-3">
            <button id="newChatBtn" class="w-full flex items-center justify-center gap-3 bg-brand-blue text-white py-3 px-4 rounded-full shadow-md shadow-blue-100 hover:bg-brand-hover hover:shadow-lg transition-all duration-300 transform hover:-translate-y-0.5">
                <i class="fa-solid fa-pen-to-square"></i>
                <span class="font-medium">New Chat</span>
            </button>

            <div class="relative flex items-center w-full bg-white border border-slate-200 rounded-full px-3.5 py-2 group focus-within:border-brand-blue transition-all duration-200">
                <i class="fa-solid fa-magnifying-glass text-slate-400 text-xs mr-2"></i>
                <input type="text" id="historySearch" placeholder="Search chats..." class="w-full bg-transparent text-xs outline-none text-slate-700 placeholder-slate-400">
                <button id="clearSearchBtn" class="hidden text-slate-300 hover:text-slate-500 transition-colors ml-1">
                    <i class="fa-solid fa-circle-xmark text-xs"></i>
                </button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-4 pt-0">
            <h3 class="text-xs font-bold text-slate-400 mb-3 uppercase tracking-wider pl-2">History</h3>
            <div id="historyList" class="space-y-1 max-h-[calc(100vh-280px)] overflow-y-auto pr-1">
                </div>
        </div>

        <div class="p-4 border-t border-slate-100 space-y-1.5">
            <button onclick="window.location.href='contact.html'" class="w-full flex items-center gap-3 text-slate-600 p-3 rounded-xl hover:bg-white hover:text-brand-blue border border-transparent hover:border-slate-100 transition-all duration-200">
                <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-slate-500 group-hover:bg-brand-light group-hover:text-brand-blue transition-colors">
                    <i class="fa-solid fa-headset text-sm"></i>
                </div>
                <span class="font-medium text-sm">Contact Us</span>
            </button>

            <button onclick="window.location.href='index.html'" class="w-full flex items-center gap-3 text-slate-600 p-3 rounded-xl hover:bg-white hover:text-brand-blue border border-transparent hover:border-slate-100 transition-all duration-200">
                <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-slate-500 group-hover:bg-brand-light group-hover:text-brand-blue transition-colors">
                    <i class="fa-solid fa-house-chimney text-xs"></i>
                </div>
                <span class="font-medium text-sm">Return to Homepage</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative min-w-0 bg-white h-full">
        
        <header class="h-16 flex items-center justify-between px-4 sm:px-6 border-b border-slate-100 bg-white/80 backdrop-blur-md z-40 sticky top-0">
            <div class="flex items-center gap-4">
                <button id="toggleSidebarBtn" class="text-slate-400 hover:text-brand-blue text-xl transition-colors">
                    <i class="fa-solid fa-bars-staggered"></i>
                </button>
                <a href="index.html" class="text-2xl font-black tracking-tighter text-brand-blue cursor-pointer">QUANS<span class="text-slate-900">.</span></a>
            </div>
            
            <div class="relative">
                <button id="userMenuBtn" class="flex items-center space-x-1.5 transition-all duration-200 group">
                    <span class="text-sm font-semibold text-slate-900 hover:text-black cursor-pointer transition-colors duration-150" id="userGreeting">Hello!</span>
                    <i class="fa-solid fa-chevron-down text-[10px] text-slate-400 group-hover:text-slate-600 transition-colors"></i>
                </button>

                <div id="userDropdown" class="absolute right-0 mt-2 w-48 bg-white border border-slate-100 rounded-2xl shadow-xl py-1.5 opacity-0 pointer-events-none transform translate-y-2 transition-all duration-200 z-50">
                    <button id="logoutBtn" class="w-full flex items-center space-x-2 px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 text-left transition-colors font-medium">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i>
                        <span>Logout</span>
                    </button>
                </div>
            </div>
        </header>

        <div id="chatBox" class="flex-1 overflow-y-auto p-4 sm:p-6 pb-48 sm:pb-36 relative">
            <div id="welcomeScreen" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none transition-opacity duration-500">
                <div class="w-16 h-16 bg-brand-light text-brand-blue rounded-full flex items-center justify-center text-2xl mb-4 shadow-sm">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                </div>
                <h2 class="text-3xl font-bold text-slate-800">Let's get started</h2>
                <p class="text-slate-500 mt-2">What are we building today?</p>
            </div>

            <div id="messagesArea" class="max-w-3xl mx-auto flex flex-col space-y-6 mb-6 hidden"></div>
        </div>

        <div id="inputWrapper" class="absolute bottom-0 w-full bg-gradient-to-t from-white via-white to-transparent pt-6 pb-[calc(6rem+env(safe-area-inset-bottom))] sm:pb-6 px-4 transition-[bottom] duration-100 ease-out z-30">
            <div class="max-w-3xl mx-auto relative flex flex-col bg-white border border-slate-200 rounded-full shadow-md focus-within:border-brand-blue focus-within:shadow-lg transition-all duration-300 px-6 py-1.5">
                
                <div id="fileUploadPreviewArea" class="w-full flex flex-wrap gap-2 px-2 mt-2 empty:mt-0 empty:hidden"></div>

                <div class="flex items-center w-full relative">
                    <div id="attachPopup" class="absolute bottom-full left-0 mb-4 bg-white border border-slate-100 shadow-2xl rounded-2xl p-1.5 opacity-0 pointer-events-none transform translate-y-2 transition-all duration-200 z-50 w-52">
                        <button id="triggerMemorySearch" class="w-full flex items-center gap-2.5 text-left px-3 py-2.5 rounded-xl text-slate-600 hover:bg-brand-light hover:text-brand-blue text-sm font-medium transition-all duration-200 cursor-pointer">
                            <i class="fa-solid fa-laptop-file text-base text-brand-blue"></i>
                            <span>Upload from Device</span>
                        </button>
                        <div class="absolute -bottom-1 left-5 w-2 h-2 bg-white border-b border-r border-slate-100 transform rotate-45"></div>
                    </div>

                    <button id="attachBtn" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:text-brand-blue hover:bg-brand-light rounded-full transition-colors shrink-0">
                        <i class="fa-solid fa-plus text-xl"></i>
                    </button>
                    
                    <input type="text" id="messageInput" placeholder="Message QUANS..." class="w-full bg-transparent py-3.5 pl-3 pr-14 outline-none text-slate-700 placeholder-slate-400 text-base">
                    
                    <button id="sendBtn" class="absolute right-0 w-10 h-10 bg-brand-blue text-white rounded-full flex items-center justify-center hover:bg-brand-hover shadow-sm transition-transform hover:scale-105 active:scale-95 disabled:opacity-50 shrink-0">
                        <i class="fa-solid fa-arrow-up text-sm"></i>
                    </button>
                </div>
            </div>
            <p class="text-center text-[10px] text-slate-400 mt-3 font-medium">QUANS AI can make mistakes. Verify important information.</p>
        </div>

    </main>

    <script>
        // --- INITIALIZE REAL-TIME CONFIG ---
        const firebaseConfig = {
              apiKey: "AIzaSyAlixKQr90Wn2u1kOkE7erppf7omed5KXU",
              authDomain: "quans-175a2.firebaseapp.com",
              projectId: "quans-175a2",
              storageBucket: "quans-175a2.firebasestorage.app",
              messagingSenderId: "221298439204",
              appId: "1:221298439204:web:47b39c005411c979ca54b1",
              measurementId: "G-J6EZ37W65Y"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();

        // DOM Elements
        const sidebar = document.getElementById('sidebar');
        const toggleSidebarBtn = document.getElementById('toggleSidebarBtn');
        const closeSidebarMobile = document.getElementById('closeSidebarMobile');
        const mobileOverlay = document.getElementById('mobileOverlay');
        
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const messagesArea = document.getElementById('messagesArea');
        const chatBox = document.getElementById('chatBox');
        
        const attachBtn = document.getElementById('attachBtn');
        const attachPopup = document.getElementById('attachPopup');
        const triggerMemorySearch = document.getElementById('triggerMemorySearch');
        const systemMemoryInput = document.getElementById('systemMemoryInput');
        const fileUploadPreviewArea = document.getElementById('fileUploadPreviewArea');
        const inputWrapper = document.getElementById('inputWrapper');
        
        const newChatBtn = document.getElementById('newChatBtn');
        const historyList = document.getElementById('historyList');
        const historySearch = document.getElementById('historySearch');
        const clearSearchBtn = document.getElementById('clearSearchBtn');

        const userMenuBtn = document.getElementById('userMenuBtn');
        const userDropdown = document.getElementById('userDropdown');
        const logoutBtn = document.getElementById('logoutBtn');
        const userGreeting = document.getElementById('userGreeting');

        // Global Application Context States
        let currentUser = null;
        let activeChatId = null;
        let localChatsCache = [];
        let uploadedFilesList = [];
        let currentChatMessages = []; // Reliable State Mirror
        let isFirstMessage = true;
        let isSidebarOpen = true;

        // --- CLEAN AUTH GUARD STATE ENGINE ---
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                userGreeting.innerText = `Hello!`;
                subscribeToChatHistory();
            } else {
                console.log("No authenticated state detected by Firebase. Redirecting...");
                window.location.href = 'index.html';
            }
        });

        // Dropdown Toggle Utility
        userMenuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            userDropdown.classList.toggle('opacity-0');
            userDropdown.classList.toggle('pointer-events-none');
            userDropdown.classList.toggle('translate-y-2');
        });

        document.addEventListener('click', () => {
            userDropdown.classList.add('opacity-0');
            userDropdown.classList.add('pointer-events-none');
            userDropdown.classList.add('translate-y-2');
        });

        logoutBtn.addEventListener('click', async () => {
            try {
                await auth.signOut();
                window.location.href = 'index.html';
            } catch (err) {
                console.error("Logout runtime context conflict:", err);
            }
        });

        // --- SIDEBAR SLIDE ANIMATION ENGINE ---
        function toggleSidebar() {
            if (window.innerWidth < 640) {
                if (sidebar.classList.contains('-translate-x-full')) {
                    sidebar.classList.remove('-translate-x-full');
                    sidebar.classList.add('translate-x-0');
                    mobileOverlay.classList.remove('hidden');
                } else {
                    sidebar.classList.remove('translate-x-0');
                    sidebar.classList.add('-translate-x-full');
                    mobileOverlay.classList.add('hidden');
                }
            } else {
                if(isSidebarOpen) {
                    sidebar.style.transform = 'translateX(-100%)';
                    sidebar.style.marginRight = `-${sidebar.offsetWidth}px`;
                } else {
                    sidebar.style.transform = 'translateX(0)';
                    sidebar.style.marginRight = '0px';
                }
                isSidebarOpen = !isSidebarOpen;
            }
        }

        if (window.innerWidth < 640) {
            sidebar.classList.add('-translate-x-full');
            isSidebarOpen = false;
        }

        toggleSidebarBtn.addEventListener('click', toggleSidebar);
        closeSidebarMobile.addEventListener('click', toggleSidebar);
        mobileOverlay.addEventListener('click', toggleSidebar);

        // --- ATTACH POPUP & INLINE MULTIMEDIA FILE PREVIEW ENGINE ---
        attachBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            attachPopup.classList.toggle('opacity-0');
            attachPopup.classList.toggle('pointer-events-none');
            attachPopup.classList.toggle('translate-y-2');
        });

        document.addEventListener('click', () => {
            attachPopup.classList.add('opacity-0');
            attachPopup.classList.add('pointer-events-none');
            attachPopup.classList.add('translate-y-2');
        });

        triggerMemorySearch.addEventListener('click', () => { systemMemoryInput.click(); });

        systemMemoryInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const fileId = 'file_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                const reader = new FileReader();

                if (file.type.startsWith('image/')) {
                    reader.onload = function(event) {
                        uploadedFilesList.push({ id: fileId, name: file.name, type: 'image', dataUrl: event.target.result });
                        renderPreviewThumbnail(fileId, file.name, event.target.result, true);
                    };
                    reader.readAsDataURL(file);
                } else {
                    reader.onload = function(event) {
                        uploadedFilesList.push({ id: fileId, name: file.name, type: 'doc', content: event.target.result });
                        renderPreviewThumbnail(fileId, file.name, null, false);
                    };
                    reader.readAsText(file);
                }
            });
            systemMemoryInput.value = '';
        });

        function renderPreviewThumbnail(id, name, dataUrl, isImage) {
            const fileCard = document.createElement('div');
            fileCard.id = id;
            fileCard.className = 'relative flex items-center gap-2 bg-slate-50 border border-slate-200 text-slate-700 p-1.5 pr-8 rounded-xl text-xs font-medium fade-in';
            
            if (isImage) {
                fileCard.innerHTML = `
                    <img src="${dataUrl}" class="w-7 h-7 object-cover rounded-md border border-slate-200">
                    <span class="max-w-[100px] truncate">${name}</span>
                    <button type="button" onclick="removeUploadedFile('${id}')" class="absolute right-2 text-slate-400 hover:text-slate-600 transition-colors">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                `;
            } else {
                fileCard.innerHTML = `
                    <div class="w-7 h-7 bg-brand-light text-brand-blue rounded-md flex items-center justify-center shrink-0"><i class="fa-solid fa-file-lines"></i></div>
                    <span class="max-w-[100px] truncate">${name}</span>
                    <button type="button" onclick="removeUploadedFile('${id}')" class="absolute right-2 text-slate-400 hover:text-slate-600 transition-colors">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                `;
            }
            fileUploadPreviewArea.appendChild(fileCard);
        }

        window.removeUploadedFile = function(fileId) {
            uploadedFilesList = uploadedFilesList.filter(f => f.id !== fileId);
            const cardElement = document.getElementById(fileId);
            if(cardElement) cardElement.remove();
        };

        function clearFilesList() {
            uploadedFilesList = [];
            fileUploadPreviewArea.innerHTML = '';
        }

        // --- FIRESTORE HISTORY STREAM SUBSCRIPTION CONTROLS ---
        function subscribeToChatHistory() {
            if (!currentUser) return;
            
            db.collection('users').doc(currentUser.uid).collection('chats')
              .orderBy('updatedAt', 'desc')
              .onSnapshot((snapshot) => {
                  localChatsCache = [];
                  snapshot.forEach(doc => { localChatsCache.push({ id: doc.id, ...doc.data() }); });
                  renderHistoryItems(localChatsCache);
              }, err => { console.error("Firestore sync link broken:", err); });
        }

        function renderHistoryItems(chats) {
            historyList.innerHTML = '';
            if(chats.length === 0) {
                historyList.innerHTML = `<p class="text-xs text-slate-400 italic pl-2 py-2">No conversations found</p>`;
                return;
            }

            chats.forEach(chat => {
                const isActive = chat.id === activeChatId;
                const historyItem = document.createElement('div');
                historyItem.className = `group flex items-center justify-between p-2.5 rounded-xl border transition-all duration-200 ${
                    isActive ? 'bg-white border-slate-200/80 shadow-xs' : 'border-transparent hover:bg-white hover:border-slate-100'
                } cursor-pointer`;
                
                historyItem.setAttribute('onclick', `loadConversation('${chat.id}')`);

                historyItem.innerHTML = `
                    <div class="flex items-center gap-2.5 text-slate-600 overflow-hidden flex-1 mr-2">
                        <i class="fa-regular fa-message text-xs shrink-0 ${isActive ? 'text-brand-blue' : ''}"></i>
                        <span id="title_text_${chat.id}" class="text-sm truncate font-medium text-slate-700">${chat.title || 'Untitled Chat'}</span>
                        <input id="title_input_${chat.id}" type="text" class="hidden text-sm bg-white border border-brand-blue px-1.5 py-0.5 rounded outline-none w-full font-medium text-slate-800" value="${chat.title || ''}" onclick="event.stopPropagation()">
                    </div>
                    <div class="flex items-center space-x-1 shrink-0">
                        <button onclick="event.stopPropagation(); triggerRenameInline('${chat.id}')" class="text-slate-400 hover:text-brand-blue opacity-0 group-hover:opacity-100 transition-opacity p-1">
                            <i class="fa-solid fa-pencil text-[11px]"></i>
                        </button>
                        <button onclick="event.stopPropagation(); deleteConversation('${chat.id}')" class="text-slate-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity p-1">
                            <i class="fa-solid fa-trash-can text-[11px]"></i>
                        </button>
                    </div>
                `;
                historyList.appendChild(historyItem);
            });
        }

        historySearch.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            if (query.length > 0) {
                clearSearchBtn.classList.remove('hidden');
                const filtered = localChatsCache.filter(chat => (chat.title && chat.title.toLowerCase().includes(query)));
                renderHistoryItems(filtered);
            } else {
                clearSearchBtn.classList.add('hidden');
                renderHistoryItems(localChatsCache);
            }
        });

        clearSearchBtn.addEventListener('click', () => {
            historySearch.value = '';
            clearSearchBtn.classList.add('hidden');
            renderHistoryItems(localChatsCache);
        });

        window.triggerRenameInline = function(chatId) {
            const labelSpan = document.getElementById(`title_text_${chatId}`);
            const editInput = document.getElementById(`title_input_${chatId}`);
            if(!labelSpan || !editInput) return;

            labelSpan.classList.add('hidden');
            editInput.classList.remove('hidden');
            editInput.focus(); editInput.select();

            const saveBlock = async () => {
                const nextTitle = editInput.value.trim();
                if(nextTitle && nextTitle !== labelSpan.innerText) {
                    labelSpan.innerText = nextTitle;
                    await db.collection('users').doc(currentUser.uid).collection('chats').doc(chatId).update({ title: nextTitle });
                }
                labelSpan.classList.remove('hidden'); editInput.classList.add('hidden');
            };

            editInput.onkeydown = (ev) => {
                if(ev.key === 'Enter') { ev.preventDefault(); saveBlock(); }
                if(ev.key === 'Escape') {
                    editInput.value = labelSpan.innerText;
                    labelSpan.classList.remove('hidden'); editInput.classList.add('hidden');
                }
            };
            editInput.onblur = saveBlock;
        };

        window.deleteConversation = async function(chatId) {
            if(!currentUser) return;
            try {
                await db.collection('users').doc(currentUser.uid).collection('chats').doc(chatId).delete();
                if(activeChatId === chatId) { resetWorkspaceUI(); }
            } catch(e) { console.error("Deletion lifecycle failure:", e); }
        };

        window.loadConversation = async function(chatId) {
            if(!currentUser) return;
            activeChatId = chatId;
            renderHistoryItems(localChatsCache);

            try {
                const snapshot = await db.collection('users').doc(currentUser.uid).collection('chats').doc(chatId).get();
                if(!snapshot.exists) return;

                const data = snapshot.data();
                messagesArea.innerHTML = '';
                currentChatMessages = data.messages || [];
                
                if (currentChatMessages.length > 0) {
                    welcomeScreen.classList.add('hidden');
                    welcomeScreen.style.opacity = '0';
                    messagesArea.classList.remove('hidden');
                    isFirstMessage = false;

                    currentChatMessages.forEach(msg => {
                        appendCustomStaticMessageBubble(msg.text, msg.role === 'user');
                    });
                } else {
                    resetWorkspaceUIKeepId(chatId);
                }
                setTimeout(() => { chatBox.scrollTop = chatBox.scrollHeight; }, 50);
                if(window.innerWidth < 640) toggleSidebar();
            } catch (err) { console.error("Payload sync error:", err); }
        };

        function appendCustomStaticMessageBubble(htmlContent, isUser) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex w-full fade-in ${isUser ? 'justify-end' : 'justify-start'}`;
            
            const bubble = document.createElement('div');
            bubble.className = `max-w-[85%] sm:max-w-[75%] px-5 py-3.5 text-[15px] leading-relaxed shadow-sm ${
                isUser ? 'bg-brand-blue text-white rounded-3xl rounded-br-sm' : 'bg-slate-50 border border-slate-100 text-slate-800 rounded-3xl rounded-bl-sm'
            }`;
            
            bubble.innerHTML = htmlContent;
            wrapper.appendChild(bubble);
            messagesArea.appendChild(wrapper);
        }

        function resetWorkspaceUI() {
            activeChatId = null;
            isFirstMessage = true;
            currentChatMessages = [];
            messagesArea.innerHTML = '';
            messagesArea.classList.add('hidden');
            welcomeScreen.classList.remove('hidden');
            welcomeScreen.style.opacity = '1';
            clearFilesList();
            renderHistoryItems(localChatsCache);
        }

        function resetWorkspaceUIKeepId(chatId) {
            activeChatId = chatId;
            isFirstMessage = true;
            currentChatMessages = [];
            messagesArea.innerHTML = '';
            messagesArea.classList.add('hidden');
            welcomeScreen.classList.remove('hidden');
            welcomeScreen.style.opacity = '1';
            clearFilesList();
        }

        newChatBtn.addEventListener('click', () => { resetWorkspaceUI(); });

        // --- TYPEWRITER ENGINE ---
        function streamAIResponseText(rawHtmlText, bubbleTargetElement) {
            bubbleTargetElement.innerHTML = ''; 
            let i = 0;
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = rawHtmlText;
            const flatTokens = [];
            
            function segmentNode(node) {
                if(node.nodeType === Node.TEXT_NODE) {
                    node.nodeValue.split('').forEach(c => flatTokens.push({ type: 'text', value: c }));
                } else if(node.nodeType === Node.ELEMENT_NODE) {
                    if(node.tagName === 'BR') {
                        flatTokens.push({ type: 'br' });
                    } else {
                        flatTokens.push({ type: 'tag-start', tag: node.tagName.toLowerCase(), attrs: Array.from(node.attributes) });
                        Array.from(node.childNodes).forEach(segmentNode);
                        flatTokens.push({ type: 'tag-end' });
                    }
                }
            }
            Array.from(tempDiv.childNodes).forEach(segmentNode);

            let activeContainer = bubbleTargetElement;
            const elementStack = [];

            async function renderNextToken() {
                if(i >= flatTokens.length) {
                    // Commit active state directly on message finish loop token
                    currentChatMessages.push({ role: 'model', text: rawHtmlText });
                    if(currentUser && activeChatId) {
                        await db.collection('users').doc(currentUser.uid).collection('chats').doc(activeChatId).update({
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                            messages: currentChatMessages
                        });
                    }
                    return;
                }

                const token = flatTokens[i];
                if(token.type === 'text') {
                    activeContainer.appendChild(document.createTextNode(token.value));
                } else if(token.type === 'br') {
                    activeContainer.appendChild(document.createElement('br'));
                } else if(token.type === 'tag-start') {
                    const el = document.createElement(token.tag);
                    token.attrs.forEach(attr => el.setAttribute(attr.name, attr.value));
                    activeContainer.appendChild(el);
                    elementStack.push(activeContainer);
                    activeContainer = el;
                } else if(token.type === 'tag-end') {
                    if(elementStack.length > 0) activeContainer = elementStack.pop();
                }

                i++;
                chatBox.scrollTop = chatBox.scrollHeight;
                setTimeout(renderNextToken, 8);
            }
            renderNextToken();
        }

        // --- TRANSACTION CONTROL DISPATCH LOOP ---
        async function handleSend() {
            let typedText = messageInput.value.trim();
            if (!typedText && uploadedFilesList.length === 0) return;

            if (isFirstMessage) {
                welcomeScreen.style.opacity = '0';
                setTimeout(() => { 
                    welcomeScreen.classList.add('hidden'); 
                    messagesArea.classList.remove('hidden');
                }, 300);
                isFirstMessage = false;
            }

            let userBubbleHTML = '';
            let payloadTextContext = typedText;

            if (uploadedFilesList.length > 0) {
                let visualRowHTML = '<div class="flex flex-wrap gap-2 mb-2">';
                uploadedFilesList.forEach(f => {
                    if(f.type === 'image') {
                        visualRowHTML += `<img src="${f.dataUrl}" class="max-w-[180px] max-h-[140px] object-cover rounded-xl border border-white/20 shadow-sm">`;
                        payloadTextContext = `[Uploaded Image Context: ${f.name}]\n` + payloadTextContext;
                    } else {
                        visualRowHTML += `<div class="flex items-center gap-2 bg-white/10 px-3 py-2 rounded-xl text-xs font-medium"><i class="fa-solid fa-file-lines"></i><span>${f.name}</span></div>`;
                        payloadTextContext = `[Uploaded Document Context in ${f.name}]:\n${f.content || ''}\n\n` + payloadTextContext;
                    }
                });
                visualRowHTML += '</div>';
                userBubbleHTML = visualRowHTML + (typedText ? `<div>${typedText}</div>` : '');
            } else {
                userBubbleHTML = `<div>${typedText}</div>`;
            }

            // Immediately push into tracking array
            appendCustomStaticMessageBubble(userBubbleHTML, true);
            currentChatMessages.push({ role: 'user', text: userBubbleHTML });
            messageInput.value = '';
            clearFilesList();
            setTimeout(() => { chatBox.scrollTop = chatBox.scrollHeight; }, 30);

            // Establish active tracking record cleanly BEFORE the fetch promise
            let deducedTitle = typedText ? (typedText.length > 24 ? typedText.substring(0, 23) + "..." : typedText) : "Document Message";
            if (!activeChatId && currentUser) {
                const freshDocRef = db.collection('users').doc(currentUser.uid).collection('chats').doc();
                activeChatId = freshDocRef.id;
                await freshDocRef.set({
                    title: deducedTitle,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    messages: currentChatMessages
                });
            } else if (currentUser && activeChatId) {
                await db.collection('users').doc(currentUser.uid).collection('chats').doc(activeChatId).update({
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    messages: currentChatMessages
                });
            }

            // Placeholder generation row 
            const aiWrapper = document.createElement('div');
            aiWrapper.className = `flex w-full fade-in justify-start`;
            const aiBubble = document.createElement('div');
            aiBubble.className = `max-w-[85%] sm:max-w-[75%] px-5 py-3.5 text-[15px] leading-relaxed shadow-sm bg-slate-50 border border-slate-100 text-slate-800 rounded-3xl rounded-bl-sm`;
            aiBubble.innerText = "Thinking...";
            aiWrapper.appendChild(aiBubble);
            messagesArea.appendChild(aiWrapper);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: payloadTextContext })
                });

                if (!response.ok) throw new Error(`API Error: ${response.status}`);

                const data = await response.json();
                const aiResponseText = data.candidates[0].content.parts[0].text;
                
                const processedHtml = aiResponseText
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*(.*?)\*/g, '<em>$1</em>')
                    .replace(/\n/g, '<br>');

                streamAIResponseText(processedHtml, aiBubble);

            } catch (error) {
                console.error("Gemini Failure:", error);
                const errorMarkup = `<span class="text-red-500 font-medium">Error fetching response. Verify server links.</span>`;
                aiBubble.innerHTML = errorMarkup;
                aiBubble.classList.add('border-red-200', 'bg-red-50');
                
                currentChatMessages.push({ role: 'model', text: errorMarkup });
                if(currentUser && activeChatId) {
                    await db.collection('users').doc(currentUser.uid).collection('chats').doc(activeChatId).update({
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        messages: currentChatMessages
                    });
                }
            }
        }

        sendBtn.addEventListener('click', handleSend);
        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });

        if (window.visualViewport) {
            const adjustMobileLayout = () => {
                if (window.innerWidth < 640) {
                    const keyboardOffset = window.innerHeight - window.visualViewport.height;
                    inputWrapper.style.bottom = keyboardOffset > 0 ? `${keyboardOffset}px` : '0px';
                    chatBox.scrollTop = chatBox.scrollHeight;
                } else {
                    inputWrapper.style.bottom = '0px';
                }
            };
            window.visualViewport.addEventListener('resize', adjustMobileLayout);
            messageInput.addEventListener('focus', () => { setTimeout(adjustMobileLayout, 50); });
        }
    </script>
</body>
</html>
