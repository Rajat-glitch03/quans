<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANS | AI Assistant</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: DM Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght=0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Free Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"DM Sans"', 'sans-serif'] },
                    colors: {
                        brand: { blue: '#4A90E2', hover: '#357ABD', light: '#F0F6FF' }
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'DM Sans', sans-serif; }
        
        /* Premium Custom Scrollbars */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: #CBD5E1; }

        /* Animation Transitions */
        .fade-in { animation: slideUpFade 0.35s ease-out forwards; }
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .sidebar-transition { transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1), transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-white text-slate-900 h-screen flex overflow-hidden selection:bg-brand-blue selection:text-white">

    <!-- HIDDEN NATIVE MEMORY ACCESS INPUT -->
    <input type="file" id="systemMemoryInput" multiple class="hidden">

    <!-- MOBILE OVERLAY BACKDROP -->
    <div id="mobileOverlay" class="fixed inset-0 bg-slate-900/30 backdrop-blur-sm z-40 hidden sm:hidden transition-opacity"></div>

    <!-- LEFT SIDEBAR (Initially Open) -->
    <aside id="sidebar" class="bg-slate-50 border-r border-slate-100 w-72 h-full flex flex-col fixed sm:relative z-50 sidebar-transition translate-x-0 ml-0">
        
        <!-- Mobile Sidebar Head -->
        <div class="p-4 flex items-center justify-between sm:hidden border-b border-slate-100">
            <span class="text-xl font-black text-brand-blue">QUANS.</span>
            <button id="closeSidebarMobile" class="text-slate-400 hover:text-slate-700 text-lg cursor-pointer">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <!-- Action: New Chat -->
        <div class="p-4">
            <button id="newChatBtn" class="w-full flex items-center justify-center gap-2.5 bg-brand-blue text-white py-3 px-4 rounded-full shadow-md shadow-blue-100 hover:bg-brand-hover hover:shadow-lg transition-all duration-300 transform hover:-translate-y-0.5 cursor-pointer font-medium tracking-wide">
                <i class="fa-solid fa-plus text-sm"></i>
                <span>New Chat</span>
            </button>
        </div>

        <!-- History Content Area (Scrollable) -->
        <div class="flex-1 overflow-y-auto px-4 pb-2">
            <h3 class="text-[11px] font-bold text-slate-400 mb-3 uppercase tracking-widest pl-2">History</h3>
            <div id="historyContainer" class="space-y-1.5">
                <!-- Initial active history container layout -->
                <div class="group flex items-center justify-between p-3 rounded-2xl bg-white border border-slate-100 cursor-pointer transition-all duration-200">
                    <div class="flex items-center gap-3 text-slate-600 overflow-hidden">
                        <i class="fa-regular fa-message text-xs text-brand-blue"></i>
                        <span class="text-sm font-medium truncate">Workspace Initialization</span>
                    </div>
                    <button onclick="event.stopPropagation(); this.parentElement.remove()" class="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all p-1">
                        <i class="fa-solid fa-trash-can text-xs"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Bottom Actions Panel -->
        <div class="p-4 border-t border-slate-100 space-y-1">
            <!-- Contact Us Button -->
            <button class="w-full flex items-center gap-3 text-slate-600 p-3 rounded-2xl hover:bg-white hover:text-brand-blue border border-transparent hover:border-slate-100 transition-all duration-200 cursor-pointer group">
                <div class="w-8 h-8 rounded-full bg-slate-200/60 flex items-center justify-center text-slate-500 group-hover:bg-brand-light group-hover:text-brand-blue transition-colors">
                    <i class="fa-solid fa-headset text-sm"></i>
                </div>
                <span class="font-medium text-sm">Contact Us</span>
            </button>

            <!-- Return To Homepage Button -->
            <button onclick="window.location.href='index.html'" class="w-full flex items-center gap-3 text-slate-600 p-3 rounded-2xl hover:bg-white hover:text-brand-blue border border-transparent hover:border-slate-100 transition-all duration-200 cursor-pointer group">
                <div class="w-8 h-8 rounded-full bg-slate-200/60 flex items-center justify-center text-slate-500 group-hover:bg-brand-light group-hover:text-brand-blue transition-colors">
                    <i class="fa-solid fa-house-chimney text-xs"></i>
                </div>
                <span class="font-medium text-sm">Return to Homepage</span>
            </button>
        </div>
    </aside>

    <!-- RIGHT MAIN SYSTEM PANEL -->
    <main class="flex-1 flex flex-col relative min-w-0 bg-white">
        
        <!-- Premium Core Top Sync Bar -->
        <header class="h-16 flex items-center justify-between px-4 sm:px-6 border-b border-slate-100 bg-white/80 backdrop-blur-md z-30 sticky top-0">
            <div class="flex items-center gap-4">
                <!-- Open/Close Controller Toggle Icon -->
                <button id="sidebarToggle" class="text-slate-400 hover:text-brand-blue text-lg transition-colors cursor-pointer">
                    <i class="fa-solid fa-bars-staggered"></i>
                </button>
                <span onclick="window.location.href='index.html'" class="text-2xl font-black tracking-tighter text-brand-blue cursor-pointer select-none">QUANS<span class="text-slate-900">.</span></span>
            </div>
            
            <!-- Auth Buttons: Matching Landing Page Layout Style -->
            <div class="flex items-center space-x-3 sm:space-x-6">
                <button class="text-sm sm:text-base font-medium text-slate-600 hover:text-brand-blue transition-colors cursor-pointer">
                    Login
                </button>
                <button class="text-sm sm:text-base font-medium bg-brand-blue text-white px-5 sm:px-7 py-2.5 rounded-full hover:bg-brand-hover shadow-md hover:shadow-lg transition-all duration-300 transform hover:-translate-y-0.5 cursor-pointer">
                    Signup
                </button>
            </div>
        </header>

        <!-- Conversational Output Node Viewport -->
        <div id="scrollViewport" class="flex-1 overflow-y-auto p-4 sm:p-6 pb-36">
            
            <!-- Initial Default Welcome Grid Node -->
            <div id="welcomeScreen" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none transition-all duration-300">
                <div class="w-14 h-14 bg-brand-light text-brand-blue rounded-full flex items-center justify-center text-xl mb-4 shadow-sm animate-pulse">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                </div>
                <h2 class="text-3xl font-bold tracking-tight text-slate-800">Let's get started</h2>
                <p class="text-slate-400 text-sm mt-1">Select an item or send an open request payload.</p>
            </div>

            <!-- Dynamic Messages Display Sub-Box -->
            <div id="messageOutputSpace" class="max-w-3xl mx-auto flex flex-col space-y-6 hidden"></div>
        </div>

        <!-- Premium Bottom Fixed Input Module -->
        <div class="absolute bottom-0 w-full bg-gradient-to-t from-white via-white to-transparent pt-8 pb-6 px-4 z-20">
            <div class="max-w-3xl mx-auto relative">
                
                <!-- ATTACH SYSTEM MEMORY POPUP MODAL DIALOG CONTAINER -->
                <div id="attachPopup" class="absolute bottom-full left-4 mb-4 bg-white border border-slate-100 shadow-2xl rounded-2xl p-3 opacity-0 pointer-events-none transform translate-y-3 transition-all duration-200 z-50 w-52">
                    <button id="triggerMemorySearch" class="w-full flex items-center gap-3 text-left px-3 py-2.5 rounded-xl text-slate-600 hover:bg-brand-light hover:text-brand-blue text-sm font-medium transition-all cursor-pointer">
                        <i class="fa-solid fa-laptop-file text-base"></i>
                        <span>Upload from Device</span>
                    </button>
                    <div class="absolute -bottom-1.5 left-4 w-3 h-3 bg-white border-b border-r border-slate-100 transform rotate-45"></div>
                </div>

                <!-- Input Field Inner Capsule Wrapper (Curved Shape Design) -->
                <div class="flex items-center bg-white border-2 border-slate-100 rounded-[32px] shadow-sm focus-within:border-brand-blue focus-within:shadow-md focus-within:shadow-blue-50/50 transition-all duration-300 overflow-hidden p-1.5 pl-3">
                    
                    <!-- Plus Operational Button -->
                    <button id="plusBtn" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:text-brand-blue hover:bg-brand-light rounded-full transition-colors cursor-pointer">
                        <i class="fa-solid fa-plus text-lg"></i>
                    </button>
                    
                    <!-- Context Entry Box Textarea/Input element -->
                    <input type="text" id="userInputField" placeholder="Message QUANS Engine..." class="w-full bg-transparent py-3 px-3 outline-none text-slate-700 placeholder-slate-400 text-[15px]">
                    
                    <!-- Send Interface Icon Button Trigger -->
                    <button id="submitRequestBtn" class="w-10 h-10 bg-brand-blue text-white rounded-full flex items-center justify-center hover:bg-brand-hover shadow-sm transition-transform hover:scale-105 active:scale-95 cursor-pointer">
                        <i class="fa-solid fa-arrow-up text-sm"></i>
                    </button>
                </div>
            </div>
            <p class="text-center text-[10px] text-slate-400 mt-3 tracking-wide">Secure Sandbox Engine v1.1 • Enterprise Privacy Infrastructure</p>
        </div>

    </main>

    <!-- OPERATIONAL CLIENT APPLICATION SCRIPT SKELETON -->
    <script>
        // DOM Nodes Mapping
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');
        const closeSidebarMobile = document.getElementById('closeSidebarMobile');
        const mobileOverlay = document.getElementById('mobileOverlay');
        
        const userInputField = document.getElementById('userInputField');
        const submitRequestBtn = document.getElementById('submitRequestBtn');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const messageOutputSpace = document.getElementById('messageOutputSpace');
        const scrollViewport = document.getElementById('scrollViewport');
        
        const plusBtn = document.getElementById('plusBtn');
        const attachPopup = document.getElementById('attachPopup');
        const triggerMemorySearch = document.getElementById('triggerMemorySearch');
        const systemMemoryInput = document.getElementById('systemMemoryInput');
        
        const newChatBtn = document.getElementById('newChatBtn');
        const historyContainer = document.getElementById('historyContainer');

        let desktopSidebarVisible = true;
        let isWorkspaceFresh = true;
        let runningChatIndex = 1;

        // --- SIDEBAR MANAGEMENT CAPABILITIES ---
        function runSidebarToggle() {
            if (window.innerWidth < 640) { // Mobile Flow Rules
                sidebar.classList.toggle('-translate-x-full');
                mobileOverlay.classList.toggle('hidden');
            } else { // High Definition Desktop Layout Rules
                if (desktopSidebarVisible) {
                    sidebar.style.marginLeft = `-${sidebar.offsetWidth}px`;
                    sidebar.classList.remove('translate-x-0');
                    sidebar.classList.add('-translate-x-full');
                } else {
                    sidebar.style.marginLeft = '0px';
                    sidebar.classList.remove('-translate-x-full');
                    sidebar.classList.add('translate-x-0');
                }
                desktopSidebarVisible = !desktopSidebarVisible;
            }
        }

        // Auto-adapt constraints at startup 
        if (window.innerWidth < 640) {
            sidebar.classList.add('-translate-x-full');
            desktopSidebarVisible = false;
        }

        sidebarToggle.addEventListener('click', runSidebarToggle);
        closeSidebarMobile.addEventListener('click', runSidebarToggle);
        mobileOverlay.addEventListener('click', runSidebarToggle);

        // --- SYSTEM MEMORY ACCESS & POPUP LOGIC ---
        plusBtn.addEventListener('click', (event) => {
            event.stopPropagation();
            attachPopup.classList.toggle('opacity-0');
            attachPopup.classList.toggle('pointer-events-none');
            attachPopup.classList.toggle('translate-y-3');
        });

        // Close Pop-up when clicking anywhere else on document
        document.addEventListener('click', () => {
            attachPopup.classList.add('opacity-0');
            attachPopup.classList.add('pointer-events-none');
            attachPopup.classList.add('translate-y-3');
        });

        // Intercept action context & tap system local hardware directories
        triggerMemorySearch.addEventListener('click', () => {
            systemMemoryInput.click();
        });

        systemMemoryInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                alert(`System Memory Linked: ${e.target.files.length} file(s) staging ready.`);
            }
        });

        // --- CONVERSATIONAL CORE ENGINES ---
        function renderBubble(payload, userFlag) {
            const rowWrapper = document.createElement('div');
            rowWrapper.className = `flex w-full fade-in ${userFlag ? 'justify-end' : 'justify-start'}`;
            
            const messageCapsule = document.createElement('div');
            messageCapsule.className = `max-w-[85%] sm:max-w-[72%] px-5 py-3.5 text-sm leading-relaxed shadow-sm ${
                userFlag 
                ? 'bg-brand-blue text-white rounded-[24px] rounded-br-sm font-medium' 
                : 'bg-slate-50 border border-slate-100 text-slate-800 rounded-[24px] rounded-bl-sm font-normal'
            }`;
            messageCapsule.innerText = payload;
            
            rowWrapper.appendChild(messageCapsule);
            return rowWrapper;
        }

        function triggerTransmission() {
            const promptValue = userInputField.value.trim();
            if (!promptValue) return;

            // Remove welcome view states upon initial transmission interaction
            if (isWorkspaceFresh) {
                welcomeScreen.style.opacity = '0';
                setTimeout(() => {
                    welcomeScreen.classList.add('hidden');
                    messageOutputSpace.classList.remove('hidden');
                }, 200);
                isWorkspaceFresh = false;
            }

            // Push User Message Node
            messageOutputSpace.appendChild(renderBubble(promptValue, true));
            userInputField.value = '';
            scrollViewport.scrollTop = scrollViewport.scrollHeight;

            // Push Target Response Context Variant Array ("Initiated.")
            setTimeout(() => {
                messageOutputSpace.appendChild(renderBubble("Initiated.", false));
                scrollViewport.scrollTop = scrollViewport.scrollHeight;
            }, 450);
        }

        submitRequestBtn.addEventListener('click', triggerTransmission);
        userInputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') triggerTransmission();
        });

        // --- RECOVERY ARCHIVE LOGS (HISTORY SAVE INTERPRETATION) ---
        newChatBtn.addEventListener('click', () => {
            // Save state context only if conversations were parsed
            if (!isWorkspaceFresh) {
                const firstUserBubble = messageOutputSpace.querySelector('.justify-end text-sm, div');
                const extractedCaption = firstUserBubble ? firstUserBubble.innerText : `Session Module ${runningChatIndex}`;
                
                const archivalLogRecord = document.createElement('div');
                archivalLogRecord.className = 'group flex items-center justify-between p-3 rounded-2xl hover:bg-white border border-transparent hover:border-slate-100 cursor-pointer transition-all duration-200 fade-in';
                archivalLogRecord.innerHTML = `
                    <div class="flex items-center gap-3 text-slate-600 overflow-hidden">
                        <i class="fa-regular fa-message text-xs"></i>
                        <span class="text-sm font-medium truncate">${extractedCaption}</span>
                    </div>
                    <button onclick="event.stopPropagation(); this.parentElement.remove()" class="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all p-1">
                        <i class="fa-solid fa-trash-can text-xs"></i>
                    </button>
                `;
                
                historyContainer.prepend(archivalLogRecord);
                runningChatIndex++;
            }

            // Restore Interface Context Viewport Configurations
            messageOutputSpace.innerHTML = '';
            messageOutputSpace.classList.add('hidden');
            welcomeScreen.classList.remove('hidden');
            void welcomeScreen.offsetWidth; // Force CSS Engine paint sequence
            welcomeScreen.style.opacity = '1';
            isWorkspaceFresh = true;
        });
    </script>
</body>
</html>
