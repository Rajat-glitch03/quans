<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANS | AI Assistant</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: DM Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght=0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"DM Sans"', 'sans-serif'] },
                    colors: {
                        brand: { blue: '#4A90E2', hover: '#357ABD', light: '#F0F6FF' }
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'DM Sans', sans-serif; background-color: #FFFFFF; }
        
        /* Custom Premium Scrollbar for Chat History */
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 99px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #CBD5E1; }

        /* Animation Keyframes */
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="h-screen flex overflow-hidden bg-white text-slate-900 selection:bg-brand-blue/10">

    <!-- Hidden Native File Input to Trigger System Memory -->
    <input type="file" id="nativeFileInput" class="hidden" multiple>

    <!-- Mobile Navigation Overlay Drawer background shadow -->
    <div id="mobileOverlay" class="fixed inset-0 z-40 hidden bg-slate-900/40 backdrop-blur-sm transition-opacity duration-300 sm:hidden"></div>

    <!-- LEFT COMPACT SIDEBAR -->
    <aside id="sidebar" class="bg-slate-50 border-r border-slate-100 w-72 h-full flex flex-col fixed sm:relative z-50 transform transition-transform duration-300 ease-in-out translate-x-0 shrink-0">
        
        <!-- Mobile Sidebar Brand Header -->
        <div class="p-4 flex items-center justify-between sm:hidden border-b border-slate-100">
            <span class="text-2xl font-black text-brand-blue tracking-tighter">QUANS.</span>
            <button id="closeSidebarMobile" class="text-slate-400 hover:text-slate-700 p-1">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>

        <!-- Action Module: New Chat -->
        <div class="p-4">
            <button id="newChatBtn" class="w-full flex items-center justify-center gap-3 bg-brand-blue text-white py-3 px-4 rounded-full shadow-md shadow-blue-100 hover:bg-brand-hover hover:shadow-lg transition-all duration-300 transform hover:-translate-y-0.5 cursor-pointer font-medium text-sm tracking-wide">
                <i class="fa-solid fa-plus text-xs"></i>
                <span>New Chat</span>
            </button>
        </div>

        <!-- Session Ledger: Scrollable History -->
        <div class="flex-1 overflow-y-auto px-4 pb-2 custom-scroll">
            <h3 class="text-[11px] font-bold text-slate-400 mb-3 uppercase tracking-widest pl-2">History</h3>
            <div id="historyList" class="space-y-1">
                <!-- Fallback entry placeholder -->
                <div class="group flex items-center justify-between p-3 rounded-xl hover:bg-white border border-transparent hover:border-slate-100 cursor-pointer transition-all duration-200">
                    <div class="flex items-center gap-3 text-slate-600 overflow-hidden">
                        <i class="fa-regular fa-message text-sm text-slate-400"></i>
                        <span class="text-xs font-medium truncate">Example Interaction Analysis</span>
                    </div>
                    <button onclick="this.parentElement.remove()" class="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity p-1">
                        <i class="fa-solid fa-trash-can text-xs"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Sidebar Base Navigation Items -->
        <div class="p-4 border-t border-slate-100 space-y-1 bg-slate-50/80">
            <button class="w-full flex items-center gap-3 text-slate-600 p-2.5 rounded-xl hover:bg-white hover:text-brand-blue border border-transparent hover:border-slate-100 transition-all duration-200 text-left cursor-pointer">
                <div class="w-7 h-7 rounded-lg bg-slate-200/60 flex items-center justify-center text-slate-500 text-xs">
                    <i class="fa-solid fa-headset"></i>
                </div>
                <span class="font-medium text-xs">Contact Us</span>
            </button>
            
            <button onclick="window.location.href='index.html'" class="w-full flex items-center gap-3 text-slate-600 p-2.5 rounded-xl hover:bg-white hover:text-brand-blue border border-transparent hover:border-slate-100 transition-all duration-200 text-left cursor-pointer">
                <div class="w-7 h-7 rounded-lg bg-slate-200/60 flex items-center justify-center text-slate-500 text-xs">
                    <i class="fa-solid fa-house-chimney"></i>
                </div>
                <span class="font-medium text-xs">Return to Homepage</span>
            </button>
        </div>
    </aside>

    <!-- CORE SYSTEM INTERFACE AREA -->
    <main class="flex-1 flex flex-col relative min-w-0 bg-white">
        
        <!-- Global Sticky Dashboard Bar Header -->
        <header class="h-20 flex items-center justify-between px-4 sm:px-8 border-b border-slate-100 bg-white/80 backdrop-blur-md z-30 sticky top-0">
            <div class="flex items-center gap-4">
                <!-- Layout control switch trigger -->
                <button id="toggleSidebarBtn" class="text-slate-400 hover:text-brand-blue p-2 rounded-xl hover:bg-slate-50 transition-colors cursor-pointer">
                    <i class="fa-solid fa-bars-staggered text-lg"></i>
                </button>
                <span onclick="window.location.href='index.html'" class="text-2xl font-black tracking-tighter text-brand-blue cursor-pointer select-none">QUANS<span class="text-slate-900">.</span></span>
            </div>
            
            <!-- Replicated Authentic Matching Authentication Node Layout -->
            <div class="flex items-center space-x-3 sm:space-x-6">
                <button class="text-sm sm:text-base font-medium text-slate-600 hover:text-brand-blue transition-colors cursor-pointer">
                    Login
                </button>
                <button class="text-sm sm:text-base font-medium bg-brand-blue text-white px-5 sm:px-7 py-2.5 rounded-full hover:bg-brand-hover shadow-md hover:shadow-lg transition-all duration-300 transform hover:-translate-y-0.5 cursor-pointer">
                    Signup
                </button>
            </div>
        </header>

        <!-- Message Grid Box Dynamic Layer Viewport -->
        <div id="chatBox" class="flex-grow overflow-y-auto p-4 sm:p-8 pb-36 relative custom-scroll">
            
            <!-- Default Initialization Welcoming Layout Display -->
            <div id="welcomeScreen" class="absolute inset-0 flex flex-col items-center justify-center text-center px-4 pointer-events-none transition-all duration-300">
                <div class="w-14 h-14 bg-brand-light text-brand-blue rounded-2xl flex items-center justify-center text-xl mb-4 shadow-sm">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                </div>
                <h2 class="text-2xl sm:text-3xl font-bold tracking-tight text-slate-800">Let's get started</h2>
                <p class="text-sm text-slate-400 mt-1 max-w-xs">Deploy commands and query intelligence files dynamically.</p>
            </div>

            <!-- Dynamic DOM Thread Injector Node Panel -->
            <div id="messagesArea" class="max-w-3xl mx-auto flex flex-col space-y-6 hidden"></div>
        </div>

        <!-- Console Entry Fixed Form Base Container Wrapper -->
        <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-white via-white to-transparent pt-8 pb-6 px-4 z-20">
            <div class="max-w-3xl mx-auto relative">
                
                <!-- Dynamic Attach Action Floating Popup Menu Panel UI -->
                <div id="attachMenuPopup" class="absolute bottom-full left-2 mb-3 bg-white border border-slate-100 p-2 rounded-2xl shadow-xl shadow-slate-200/80 w-48 opacity-0 pointer-events-none transform translate-y-2 transition-all duration-200 z-50">
                    <button id="actionTriggerUpload" class="w-full flex items-center gap-3 text-left px-3 py-2.5 rounded-xl text-slate-600 hover:bg-brand-light hover:text-brand-blue text-xs font-semibold transition-colors cursor-pointer">
                        <i class="fa-solid fa-cloud-arrow-up text-sm"></i>
                        <span>Attach files</span>
                    </button>
                </div>

                <!-- Input Console Wrapper -->
                <div class="flex items-center bg-white border-2 border-slate-100 rounded-2xl shadow-sm focus-within:border-brand-blue focus-within:shadow-md transition-all duration-300">
                    
                    <!-- Plus Menu Activator -->
                    <button id="plusMenuBtn" class="absolute left-3 w-10 h-10 flex items-center justify-center text-slate-400 hover:text-brand-blue hover:bg-brand-light rounded-xl transition-colors cursor-pointer">
                        <i class="fa-solid fa-plus text-lg"></i>
                    </button>
                    
                    <!-- Text Console Node Field -->
                    <input type="text" id="messageInput" placeholder="Message QUANS..." class="w-full bg-transparent py-4 pl-14 pr-14 outline-none text-sm text-slate-700 placeholder-slate-400">
                    
                    <!-- Transmission Action Trigger Button -->
                    <button id="sendBtn" class="absolute right-3 w-10 h-10 bg-brand-blue text-white rounded-xl flex items-center justify-center hover:bg-brand-hover shadow-sm transition-all duration-200 hover:scale-105 active:scale-95 cursor-pointer">
                        <i class="fa-solid fa-paper-plane text-xs"></i>
                    </button>
                </div>
            </div>
            <p class="text-center text-[10px] text-slate-400 mt-3 font-semibold tracking-wide">QUANS AI Engine Workspace infrastructure &copy; 2026</p>
        </div>

    </main>

    <!-- INTERFACE DRIVER SCRIPT CORE ENGINE -->
    <script>
        // Core Node Elements Hooks
        const sidebar = document.getElementById('sidebar');
        const toggleSidebarBtn = document.getElementById('toggleSidebarBtn');
        const closeSidebarMobile = document.getElementById('closeSidebarMobile');
        const mobileOverlay = document.getElementById('mobileOverlay');
        
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const messagesArea = document.getElementById('messagesArea');
        const chatBox = document.getElementById('chatBox');
        
        const plusMenuBtn = document.getElementById('plusMenuBtn');
        const attachMenuPopup = document.getElementById('attachMenuPopup');
        const actionTriggerUpload = document.getElementById('actionTriggerUpload');
        const nativeFileInput = document.getElementById('nativeFileInput');
        
        const newChatBtn = document.getElementById('newChatBtn');
        const historyList = document.getElementById('historyList');

        let isSidebarOpen = true;
        let isFirstMessage = true;
        let sessionCounter = 1;

        // --- RESPONSIVE SIDEBAR MANIPULATION LOGIC ---
        function toggleSidebarState() {
            if (window.innerWidth < 640) { // Mobile Adaptive
                sidebar.classList.toggle('-translate-x-full');
                mobileOverlay.classList.toggle('hidden');
            } else { // PC Frame Viewport Padding adjustments
                if(isSidebarOpen) {
                    sidebar.style.marginLeft = `-${sidebar.offsetWidth}px`;
                } else {
                    sidebar.style.marginLeft = '0px';
                }
                isSidebarOpen = !isSidebarOpen;
            }
        }

        // Initialize Responsive default breakpoints conditions
        if (window.innerWidth < 640) {
            sidebar.classList.add('-translate-x-full');
            isSidebarOpen = false;
        }

        toggleSidebarBtn.addEventListener('click', toggleSidebarState);
        closeSidebarMobile.addEventListener('click', toggleSidebarState);
        mobileOverlay.addEventListener('click', toggleSidebarState);

        // --- POPUP MENU & NATIVE FILE SYSTEM CONNECTIVITY DRIVER ---
        plusMenuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            attachMenuPopup.classList.toggle('opacity-0');
            attachMenuPopup.classList.toggle('pointer-events-none');
            attachMenuPopup.classList.toggle('translate-y-2');
        });

        // Close Pop-ups if click occurs outside layout boundary zones
        document.addEventListener('click', () => {
            attachMenuPopup.classList.add('opacity-0', 'pointer-events-none', 'translate-y-2');
        });

        // Bridge UI Menu Action item straight to System Local Drive Memory API
        actionTriggerUpload.addEventListener('click', () => {
            nativeFileInput.click();
        });

        nativeFileInput.addEventListener('change', (e) => {
            const files = e.target.files;
            if (files.length > 0) {
                alert(`System Memory Connected successfully.\nSelected File: "${files[0].name}" linked to local console prompt session.`);
            }
        });

        // --- CONSOLE ENGINE LOGIC UTILS ---
        function createDOMBubbleNode(text, isUserControlled) {
            const rowWrapper = document.createElement('div');
            rowWrapper.className = `flex w-full fade-in ${isUserControlled ? 'justify-end' : 'justify-start'}`;
            
            const textCard = document.createElement('div');
            textCard.className = `max-w-[85%] sm:max-w-[75%] px-5 py-3.5 text-sm leading-relaxed shadow-sm tracking-wide ${
                isUserControlled 
                ? 'bg-brand-blue text-white rounded-2xl rounded-br-none font-medium' 
                : 'bg-slate-50 border border-slate-100 text-slate-800 rounded-2xl rounded-bl-none'
            }`;
            textCard.innerText = text;
            
            rowWrapper.appendChild(textCard);
            return rowWrapper;
        }

        function executeMessagePipeline() {
            const promptValue = messageInput.value.trim();
            if (!promptValue) return;

            // Clear splash background layers smoothly on first communication frame
            if (isFirstMessage) {
                welcomeScreen.style.opacity = '0';
                setTimeout(() => { 
                    welcomeScreen.classList.add('hidden'); 
                    messagesArea.classList.remove('hidden');
                }, 200);
                isFirstMessage = false;
            }

            // Render active user command string input parameters
            messagesArea.appendChild(createDOMBubbleNode(promptValue, true));
            messageInput.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // Deploy mock engine transaction response feedback
            setTimeout(() => {
                messagesArea.appendChild(createDOMBubbleNode("Initiated.", false));
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 450);
        }

        sendBtn.addEventListener('click', executeMessagePipeline);
        messageInput.addEventListener('keypress', (event) => {
            if (event.key === 'Enter') {
                executeMessagePipeline();
            }
        });

        // --- SESSION CONTROL HISTORY CONSOLE GENERATOR ---
        newChatBtn.addEventListener('click', () => {
            if (!isFirstMessage) {
                const itemNode = document.createElement('div');
                itemNode.className = 'group flex items-center justify-between p-3 rounded-xl hover:bg-white border border-transparent hover:border-slate-100 cursor-pointer transition-all duration-200 fade-in';
                itemNode.innerHTML = `
                    <div class="flex items-center gap-3 text-slate-600 overflow-hidden">
                        <i class="fa-regular fa-message text-sm text-slate-400"></i>
                        <span class="text-xs font-semibold truncate">Saved Session Grid ${sessionCounter++}</span>
                    </div>
                    <button onclick="this.parentElement.remove()" class="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity p-1">
                        <i class="fa-solid fa-trash-can text-xs"></i>
                    </button>
                `;
                historyList.prepend(itemNode);
            }

            // Reset dynamic viewport nodes elements states back to fresh initialization
            messagesArea.innerHTML = '';
            messagesArea.classList.add('hidden');
            welcomeScreen.classList.remove('hidden');
            void welcomeScreen.offsetWidth; 
            welcomeScreen.style.opacity = '1';
            isFirstMessage = true;
        });
    </script>
</body>
</html>
