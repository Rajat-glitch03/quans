<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANS | AI Assistant</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: DM Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"DM Sans"', 'sans-serif'] },
                    colors: {
                        brand: { blue: '#4A90E2', hover: '#357ABD', light: '#F0F6FF' }
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'DM Sans', sans-serif; }
        
        /* Premium Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #CBD5E1; }

        /* Animations */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Mobile Overlay */
        .sidebar-overlay { background: rgba(0,0,0,0.4); backdrop-filter: blur(2px); }
    </style>
</head>
<body class="bg-white text-slate-900 h-screen flex overflow-hidden selection:bg-brand-blue selection:text-white">

    <!-- MOBILE OVERLAY (Hidden by default) -->
    <div id="mobileOverlay" class="fixed inset-0 z-40 hidden sidebar-overlay transition-opacity duration-300 sm:hidden"></div>

    <!-- LEFT SIDEBAR -->
    <aside id="sidebar" class="bg-slate-50 border-r border-slate-100 w-72 h-full flex flex-col fixed sm:relative z-50 transform transition-transform duration-300 ease-in-out translate-x-0">
        
        <!-- Sidebar Header / Mobile Close -->
        <div class="p-4 flex items-center justify-between sm:hidden border-b border-slate-100">
            <span class="text-xl font-black text-brand-blue">QUANS.</span>
            <button id="closeSidebarMobile" class="text-slate-400 hover:text-slate-800 text-xl">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <!-- New Chat Button -->
        <div class="p-4">
            <button id="newChatBtn" class="w-full flex items-center justify-center gap-3 bg-brand-blue text-white py-3 px-4 rounded-full shadow-md shadow-blue-100 hover:bg-brand-hover hover:shadow-lg transition-all duration-300 transform hover:-translate-y-0.5">
                <i class="fa-solid fa-pen-to-square"></i>
                <span class="font-medium">New Chat</span>
            </button>
        </div>

        <!-- History Section (Scrollable) -->
        <div class="flex-1 overflow-y-auto p-4 pt-0">
            <h3 class="text-xs font-bold text-slate-400 mb-3 uppercase tracking-wider pl-2">History</h3>
            <div id="historyList" class="space-y-1">
                <!-- Initial dummy history item -->
                <div class="group flex items-center justify-between p-3 rounded-xl hover:bg-white border border-transparent hover:border-slate-100 cursor-pointer transition-all duration-200">
                    <div class="flex items-center gap-3 text-slate-600 overflow-hidden">
                        <i class="fa-regular fa-message text-sm"></i>
                        <span class="text-sm truncate">Landing Page Ideas</span>
                    </div>
                    <button onclick="this.parentElement.remove()" class="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Contact Us (Bottom) -->
        <div class="p-4 border-t border-slate-100">
            <button class="w-full flex items-center gap-3 text-slate-600 p-3 rounded-xl hover:bg-white hover:text-brand-blue border border-transparent hover:border-slate-100 transition-all duration-200">
                <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-slate-500 group-hover:bg-brand-light group-hover:text-brand-blue transition-colors">
                    <i class="fa-solid fa-headset text-sm"></i>
                </div>
                <span class="font-medium text-sm">Contact Us</span>
            </button>
        </div>
    </aside>

    <!-- MAIN CHAT AREA -->
    <main class="flex-1 flex flex-col relative min-w-0 bg-white">
        
        <!-- Top Header -->
        <header class="h-16 flex items-center justify-between px-4 sm:px-6 border-b border-slate-100 bg-white/80 backdrop-blur-md z-10 sticky top-0">
            <div class="flex items-center gap-4">
                <!-- Sidebar Toggle Icon -->
                <button id="toggleSidebarBtn" class="text-slate-400 hover:text-brand-blue text-xl transition-colors">
                    <i class="fa-solid fa-bars-staggered"></i>
                </button>
                <a href="index.html" class="text-2xl font-black tracking-tighter text-brand-blue cursor-pointer">QUANS<span class="text-slate-900">.</span></a>
            </div>
            
            <div class="flex items-center space-x-2 sm:space-x-4">
                <button class="text-sm sm:text-base font-medium text-slate-600 hover:text-brand-blue transition-colors">Login</button>
                <button class="text-sm sm:text-base font-medium bg-slate-900 text-white px-4 sm:px-6 py-2 rounded-full hover:bg-slate-800 transition-colors">Signup</button>
            </div>
        </header>

        <!-- Messages Container -->
        <div id="chatBox" class="flex-1 overflow-y-auto p-4 sm:p-6 pb-32">
            <!-- Initial Welcome Screen -->
            <div id="welcomeScreen" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none transition-opacity duration-500">
                <div class="w-16 h-16 bg-brand-light text-brand-blue rounded-full flex items-center justify-center text-2xl mb-4 shadow-sm">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                </div>
                <h2 class="text-3xl font-bold text-slate-800">Let's get started</h2>
                <p class="text-slate-500 mt-2">What are we building today?</p>
            </div>

            <!-- Chat Bubbles will be injected here by JS -->
            <div id="messagesArea" class="max-w-3xl mx-auto flex flex-col space-y-6 hidden"></div>
        </div>

        <!-- Input Area (Fixed at bottom) -->
        <div class="absolute bottom-0 w-full bg-gradient-to-t from-white via-white to-transparent pt-6 pb-6 px-4">
            <div class="max-w-3xl mx-auto relative flex items-center bg-white border-2 border-slate-100 rounded-full shadow-sm focus-within:border-brand-blue focus-within:shadow-md transition-all duration-300">
                
                <!-- Attach Popup Tooltip -->
                <div id="attachPopup" class="absolute bottom-full left-0 mb-3 bg-slate-800 text-white text-xs font-medium py-2 px-3 rounded-lg shadow-xl opacity-0 pointer-events-none transform translate-y-2 transition-all duration-200 flex items-center gap-2">
                    <i class="fa-solid fa-paperclip"></i> Attach files
                    <div class="absolute -bottom-1 left-4 w-2 h-2 bg-slate-800 transform rotate-45"></div>
                </div>

                <!-- Attach Icon -->
                <button id="attachBtn" class="absolute left-2 w-10 h-10 flex items-center justify-center text-slate-400 hover:text-brand-blue hover:bg-brand-light rounded-full transition-colors">
                    <i class="fa-solid fa-plus text-xl"></i>
                </button>
                
                <!-- Input Field -->
                <input type="text" id="messageInput" placeholder="Message QUANS..." class="w-full bg-transparent py-4 pl-14 pr-14 outline-none text-slate-700 placeholder-slate-400">
                
                <!-- Send Icon -->
                <button id="sendBtn" class="absolute right-2 w-10 h-10 bg-brand-blue text-white rounded-full flex items-center justify-center hover:bg-brand-hover shadow-sm transition-transform hover:scale-105 active:scale-95 disabled:opacity-50">
                    <i class="fa-solid fa-arrow-up text-sm"></i>
                </button>
            </div>
            <p class="text-center text-[10px] text-slate-400 mt-3 font-medium">QUANS AI can make mistakes. Verify important information.</p>
        </div>

    </main>

    <!-- INTERACTION LOGIC -->
    <script>
        // DOM Elements
        const sidebar = document.getElementById('sidebar');
        const toggleSidebarBtn = document.getElementById('toggleSidebarBtn');
        const closeSidebarMobile = document.getElementById('closeSidebarMobile');
        const mobileOverlay = document.getElementById('mobileOverlay');
        
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const messagesArea = document.getElementById('messagesArea');
        const chatBox = document.getElementById('chatBox');
        
        const attachBtn = document.getElementById('attachBtn');
        const attachPopup = document.getElementById('attachPopup');
        
        const newChatBtn = document.getElementById('newChatBtn');
        const historyList = document.getElementById('historyList');

        let isSidebarOpen = true;
        let isFirstMessage = true;
        let chatCounter = 1;

        // --- SIDEBAR TOGGLE LOGIC ---
        function toggleSidebar() {
            if (window.innerWidth < 640) { // Mobile
                sidebar.classList.toggle('-translate-x-full');
                mobileOverlay.classList.toggle('hidden');
            } else { // PC
                if(isSidebarOpen) {
                    sidebar.style.marginLeft = `-${sidebar.offsetWidth}px`;
                } else {
                    sidebar.style.marginLeft = '0px';
                }
                isSidebarOpen = !isSidebarOpen;
            }
        }

        // Initialize sidebar hidden on mobile
        if (window.innerWidth < 640) {
            sidebar.classList.add('-translate-x-full');
            isSidebarOpen = false;
        }

        toggleSidebarBtn.addEventListener('click', toggleSidebar);
        closeSidebarMobile.addEventListener('click', toggleSidebar);
        mobileOverlay.addEventListener('click', toggleSidebar);

        // --- ATTACH POPUP LOGIC ---
        attachBtn.addEventListener('click', () => {
            attachPopup.classList.toggle('opacity-0');
            attachPopup.classList.toggle('pointer-events-none');
            attachPopup.classList.toggle('translate-y-2');
        });

        // --- CHAT LOGIC ---
        function createMessageBubble(text, isUser) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex w-full fade-in ${isUser ? 'justify-end' : 'justify-start'}`;
            
            const bubble = document.createElement('div');
            bubble.className = `max-w-[85%] sm:max-w-[75%] px-5 py-3.5 text-[15px] leading-relaxed shadow-sm ${
                isUser 
                ? 'bg-brand-blue text-white rounded-3xl rounded-br-sm' 
                : 'bg-slate-50 border border-slate-100 text-slate-800 rounded-3xl rounded-bl-sm'
            }`;
            bubble.innerText = text;
            
            wrapper.appendChild(bubble);
            return wrapper;
        }

        function handleSend() {
            const text = messageInput.value.trim();
            if (!text) return;

            // 1. Hide welcome screen & show message area on first use
            if (isFirstMessage) {
                welcomeScreen.style.opacity = '0';
                setTimeout(() => { 
                    welcomeScreen.classList.add('hidden'); 
                    messagesArea.classList.remove('hidden');
                }, 300);
                isFirstMessage = false;
            }

            // 2. Append User Message
            messagesArea.appendChild(createMessageBubble(text, true));
            messageInput.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // 3. Simulate AI "Initiated" Response
            setTimeout(() => {
                messagesArea.appendChild(createMessageBubble("Initiated.", false));
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 600); // 600ms fake delay to feel natural
        }

        sendBtn.addEventListener('click', handleSend);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

        // --- NEW CHAT & HISTORY LOGIC ---
        newChatBtn.addEventListener('click', () => {
            // Only save if conversation happened
            if (!isFirstMessage) {
                const historyItem = document.createElement('div');
                historyItem.className = 'group flex items-center justify-between p-3 rounded-xl hover:bg-white border border-transparent hover:border-slate-100 cursor-pointer transition-all duration-200 fade-in';
                historyItem.innerHTML = `
                    <div class="flex items-center gap-3 text-slate-600 overflow-hidden">
                        <i class="fa-regular fa-message text-sm"></i>
                        <span class="text-sm truncate">Chat Session ${chatCounter++}</span>
                    </div>
                    <button onclick="this.parentElement.remove()" class="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                `;
                historyList.prepend(historyItem); // Add to top of history
            }

            // Reset UI
            messagesArea.innerHTML = '';
            messagesArea.classList.add('hidden');
            welcomeScreen.classList.remove('hidden');
            
            // Trigger reflow for fade animation to restart
            void welcomeScreen.offsetWidth; 
            welcomeScreen.style.opacity = '1';
            
            isFirstMessage = true;
        });

    </script>
</body>
</html>
