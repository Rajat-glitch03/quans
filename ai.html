<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANS | AI Assistant</title>
    
    <!-- Tailwind CSS CDN (v3 for stable configuration) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: DM Sans (Loaded completely with all weights) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Minimalist Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#4A90E2',
                            hover: '#357ABD',
                            light: '#F4F8FF'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Force DM Sans on absolutely everything */
        * {
            font-family: 'DM Sans', sans-serif !important;
            letter-spacing: -0.01em;
        }
        
        /* Premium Subtle Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 99px; }

        /* Crisp entry animations */
        .fade-in { 
            animation: cleanSlideUp 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }
        @keyframes cleanSlideUp {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-white text-slate-900 h-screen flex overflow-hidden antialiased">

    <!-- Hidden system file input -->
    <input type="file" id="systemMemoryInput" multiple class="hidden">

    <!-- Mobile overlay backshadow -->
    <div id="mobileOverlay" class="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-40 hidden sm:hidden"></div>

    <!-- SIDEBAR (Clean, minimal gray background) -->
    <aside id="sidebar" class="bg-[#F8FAFC] border-r border-slate-100 w-72 h-full flex flex-col fixed sm:relative z-50 transition-all duration-300 ease-in-out translate-x-0 ml-0">
        
        <!-- Mobile Sidebar Head -->
        <div class="p-5 flex items-center justify-between sm:hidden border-b border-slate-100">
            <span class="text-2xl font-black text-brand-blue tracking-tighter">QUANS.</span>
            <button id="closeSidebarMobile" class="text-slate-400 hover:text-slate-700 cursor-pointer">
                <i class="fa-solid fa-xmark text-lg"></i>
            </button>
        </div>

        <!-- Action: New Chat -->
        <div class="p-4">
            <button id="newChatBtn" class="w-full flex items-center justify-center gap-2 bg-brand-blue text-white py-3 px-4 rounded-full font-medium text-sm hover:bg-brand-hover shadow-sm transition-all cursor-pointer">
                <i class="fa-solid fa-plus text-xs"></i>
                <span>New Chat</span>
            </button>
        </div>

        <!-- Scrollable Chat History -->
        <div class="flex-1 overflow-y-auto px-4 pb-4">
            <h3 class="text-[11px] font-bold text-slate-400 mb-3 uppercase tracking-widest pl-2">History</h3>
            <div id="historyContainer" class="space-y-1">
                <!-- Active session item card -->
                <div class="group flex items-center justify-between p-3 rounded-xl bg-white border border-slate-100 cursor-pointer transition-all">
                    <div class="flex items-center gap-3 text-slate-600 overflow-hidden">
                        <i class="fa-regular fa-message text-xs text-brand-blue"></i>
                        <span class="text-sm font-medium truncate">Workspace Active</span>
                    </div>
                    <button onclick="event.stopPropagation(); this.parentElement.remove()" class="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all">
                        <i class="fa-solid fa-trash-can text-xs"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Bottom Options Panel -->
        <div class="p-4 border-t border-slate-100 space-y-1">
            <button class="w-full flex items-center gap-3 text-slate-600 p-2.5 rounded-xl hover:bg-white hover:text-brand-blue transition-all cursor-pointer text-sm font-medium">
                <i class="fa-solid fa-headset text-slate-400 w-4"></i>
                <span>Contact Us</span>
            </button>

            <button onclick="window.location.href='index.html'" class="w-full flex items-center gap-3 text-slate-600 p-2.5 rounded-xl hover:bg-white hover:text-brand-blue transition-all cursor-pointer text-sm font-medium">
                <i class="fa-solid fa-house-chimney text-slate-400 w-4"></i>
                <span>Return to Homepage</span>
            </button>
        </div>
    </aside>

    <!-- MAIN INTERFACE PANEL -->
    <main class="flex-1 flex flex-col relative min-w-0 bg-white">
        
        <!-- Premium Navigation Header (Matches your landing page exactly) -->
        <header class="h-16 flex items-center justify-between px-6 border-b border-slate-100 bg-white/80 backdrop-blur-md z-30 sticky top-0">
            <div class="flex items-center gap-4">
                <button id="sidebarToggle" class="text-slate-400 hover:text-brand-blue transition-colors cursor-pointer">
                    <i class="fa-solid fa-bars-staggered text-lg"></i>
                </button>
                <span onclick="window.location.href='index.html'" class="text-3xl font-black tracking-tighter text-brand-blue cursor-pointer select-none">QUANS<span class="text-slate-900">.</span></span>
            </div>
            
            <div class="flex items-center space-x-6">
                <button class="text-base font-medium text-slate-600 hover:text-brand-blue transition-colors cursor-pointer">
                    Login
                </button>
                <button class="text-base font-medium bg-brand-blue text-white px-7 py-2.5 rounded-full hover:bg-brand-hover shadow-md hover:shadow-lg transition-all transform hover:-translate-y-0.5 cursor-pointer">
                    Signup
                </button>
            </div>
        </header>

        <!-- Conversational Output Container -->
        <div id="scrollViewport" class="flex-1 overflow-y-auto p-6 pb-36">
            
            <!-- Clean Welcome Screen Interface -->
            <div id="welcomeScreen" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none transition-all duration-200">
                <div class="w-12 h-12 bg-brand-light text-brand-blue rounded-full flex items-center justify-center text-lg mb-4 shadow-sm">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                </div>
                <h2 class="text-3xl font-bold tracking-tight text-slate-900">Let's get started</h2>
                <p class="text-slate-400 text-sm mt-1">Ask a question or attach your system project files.</p>
            </div>

            <!-- Chat Output Wrapper -->
            <div id="messageOutputSpace" class="max-w-3xl mx-auto flex flex-col space-y-6 hidden"></div>
        </div>

        <!-- Luxury Curved Floating Input Box -->
        <div class="absolute bottom-0 w-full bg-gradient-to-t from-white via-white to-transparent pt-8 pb-6 px-4 z-20">
            <div class="max-w-3xl mx-auto relative">
                
                <!-- Minimal Upload Popup Card -->
                <div id="attachPopup" class="absolute bottom-full left-2 mb-3 bg-white border border-slate-100 shadow-xl rounded-2xl p-1.5 opacity-0 pointer-events-none transform translate-y-2 transition-all duration-200 z-50 w-48">
                    <button id="triggerMemorySearch" class="w-full flex items-center gap-2.5 text-left px-3 py-2 rounded-xl text-slate-600 hover:bg-brand-light hover:text-brand-blue text-sm font-medium transition-all cursor-pointer">
                        <i class="fa-solid fa-laptop-file"></i>
                        <span>Upload from Device</span>
                    </button>
                    <div class="absolute -bottom-1 left-5 w-2 h-2 bg-white border-b border-r border-slate-100 transform rotate-45"></div>
                </div>

                <!-- Main Premium Curved Capsule -->
                <div class="flex items-center bg-white border border-slate-200 rounded-full shadow-sm focus-within:border-brand-blue focus-within:ring-4 focus-within:ring-blue-50/50 transition-all p-1.5 pl-3">
                    
                    <button id="plusBtn" class="w-9 h-9 flex items-center justify-center text-slate-400 hover:text-brand-blue hover:bg-brand-light rounded-full transition-colors cursor-pointer">
                        <i class="fa-solid fa-plus text-base"></i>
                    </button>
                    
                    <input type="text" id="userInputField" placeholder="Message QUANS..." class="w-full bg-transparent py-2.5 px-3 outline-none text-slate-800 placeholder-slate-400 text-sm font-medium">
                    
                    <button id="submitRequestBtn" class="w-9 h-9 bg-brand-blue text-white rounded-full flex items-center justify-center hover:bg-brand-hover transition-transform active:scale-95 cursor-pointer">
                        <i class="fa-solid fa-arrow-up text-xs"></i>
                    </button>
                </div>
            </div>
            <p class="text-center text-[10px] text-slate-400 mt-2 tracking-wide font-medium">Secured Sandbox Environment</p>
        </div>

    </main>

    <!-- REFINED APP INTERACTION SCRIPTS -->
    <script>
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');
        const closeSidebarMobile = document.getElementById('closeSidebarMobile');
        const mobileOverlay = document.getElementById('mobileOverlay');
        
        const userInputField = document.getElementById('userInputField');
        const submitRequestBtn = document.getElementById('submitRequestBtn');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const messageOutputSpace = document.getElementById('messageOutputSpace');
        const scrollViewport = document.getElementById('scrollViewport');
        
        const plusBtn = document.getElementById('plusBtn');
        const attachPopup = document.getElementById('attachPopup');
        const triggerMemorySearch = document.getElementById('triggerMemorySearch');
        const systemMemoryInput = document.getElementById('systemMemoryInput');
        
        const newChatBtn = document.getElementById('newChatBtn');
        const historyContainer = document.getElementById('historyContainer');

        let isSidebarOpen = true;
        let isChatFresh = true;
        let chatIndex = 1;

        // Toggle rules for both PC and Mobile
        function handleSidebarToggle() {
            if (window.innerWidth < 640) {
                sidebar.classList.toggle('-translate-x-full');
                mobileOverlay.classList.toggle('hidden');
            } else {
                if (isSidebarOpen) {
                    sidebar.style.marginLeft = `-${sidebar.offsetWidth}px`;
                } else {
                    sidebar.style.marginLeft = '0px';
                }
                isSidebarOpen = !isSidebarOpen;
            }
        }

        if (window.innerWidth < 640) {
            sidebar.classList.add('-translate-x-full');
            isSidebarOpen = false;
        }

        sidebarToggle.addEventListener('click', handleSidebarToggle);
        closeSidebarMobile.addEventListener('click', handleSidebarToggle);
        mobileOverlay.addEventListener('click', handleSidebarToggle);

        // Upload popup logic
        plusBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            attachPopup.classList.toggle('opacity-0');
            attachPopup.classList.toggle('pointer-events-none');
            attachPopup.classList.toggle('translate-y-2');
        });

        document.addEventListener('click', () => {
            attachPopup.classList.add('opacity-0');
            attachPopup.classList.add('pointer-events-none');
            attachPopup.classList.add('translate-y-2');
        });

        triggerMemorySearch.addEventListener('click', () => systemMemoryInput.click());
        systemMemoryInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) alert(`Attached: ${e.target.files[0].name}`);
        });

        // Chat parsing functions
        function makeBubble(text, isUser) {
            const row = document.createElement('div');
            row.className = `flex w-full fade-in ${isUser ? 'justify-end' : 'justify-start'}`;
            
            const box = document.createElement('div');
            box.className = `max-w-[80%] sm:max-w-[70%] px-4.5 py-3 text-sm leading-relaxed rounded-2xl ${
                isUser 
                ? 'bg-brand-blue text-white rounded-tr-none font-medium shadow-sm' 
                : 'bg-slate-100 text-slate-800 rounded-tl-none font-normal'
            }`;
            box.innerText = text;
            
            row.appendChild(box);
            return row;
        }

        function sendMsg() {
            const val = userInputField.value.trim();
            if (!val) return;

            if (isChatFresh) {
                welcomeScreen.style.opacity = '0';
                setTimeout(() => {
                    welcomeScreen.classList.add('hidden');
                    messageOutputSpace.classList.remove('hidden');
                }, 150);
                isChatFresh = false;
            }

            messageOutputSpace.appendChild(makeBubble(val, true));
            userInputField.value = '';
            scrollViewport.scrollTop = scrollViewport.scrollHeight;

            setTimeout(() => {
                messageOutputSpace.appendChild(makeBubble("Initiated.", false));
                scrollViewport.scrollTop = scrollViewport.scrollHeight;
            }, 400);
        }

        submitRequestBtn.addEventListener('click', sendMsg);
        userInputField.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMsg(); });

        // Automated Session History Management
        newChatBtn.addEventListener('click', () => {
            if (!isChatFresh) {
                const firstMsg = messageOutputSpace.querySelector('.justify-end text-sm, div');
                const title = firstMsg ? firstMsg.innerText : `Session Archive ${chatIndex}`;
                
                const card = document.createElement('div');
                card.className = 'group flex items-center justify-between p-3 rounded-xl hover:bg-white border border-transparent hover:border-slate-100 cursor-pointer transition-all fade-in';
                card.innerHTML = `
                    <div class="flex items-center gap-3 text-slate-600 overflow-hidden">
                        <i class="fa-regular fa-message text-xs"></i>
                        <span class="text-sm font-medium truncate">${title}</span>
                    </div>
                    <button onclick="event.stopPropagation(); this.parentElement.remove()" class="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all">
                        <i class="fa-solid fa-trash-can text-xs"></i>
                    </button>
                `;
                historyContainer.prepend(card);
                chatIndex++;
            }

            messageOutputSpace.innerHTML = '';
            messageOutputSpace.classList.add('hidden');
            welcomeScreen.classList.remove('hidden');
            welcomeScreen.style.opacity = '1';
            isChatFresh = true;
        });
    </script>
</body>
</html>
